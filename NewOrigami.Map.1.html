<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Origami - Core Engine</title>
    <!-- State of the art WebGL Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Game Container: Fluid Flexbox Architecture */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 3D WebGL Canvas Layer */
        #fpv-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Map View Canvas (Full Screen) */
        #map-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            box-sizing: border-box;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        
        #map-canvas { width: 100%; height: 100%; display: block; }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 8px; /* Inner rounding for the canvas */
            overflow: hidden;
        }
        
        #map-canvas { width: 100%; height: 100%; display: block; }


    </style>
</head>
<body>
    <script>
        // Emergency Debugger
        window.onerror = function(msg, url, line, col, error) {
            document.body.innerHTML += `<div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.8); color:red; z-index:9999; padding:10px; font-family:monospace;">ERROR: ${msg}<br>Line: ${line}</div>`;
        };
        window.addEventListener('unhandledrejection', function(event) {
            document.body.innerHTML += `<div style="position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.8); color:orange; z-index:9999; padding:10px; font-family:monospace;">PROMISE: ${event.reason}</div>`;
        });
    </script>
    <div id="game-container">
        <!-- 2D Map Layer -->
        <div id="map-container">
            <div class="canvas-wrapper">
                <canvas id="map-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        /**
         * CORE GAME ENGINE (Three.js integration + Application Coordinator)
         */
        const Engine = {
            // State
            player: { x: 5, z: 5, rot: 0 },
            gridSize: 2,
            mapData: [],
            mapWidth: 20,
            mapHeight: 20,
            mapCamera: null,
            headlamp: null,
            outerGlow: null,
            clock: null,
            mixers: [],
            activeTarget: null, // NPC or Monster we are adjacent to

            // Config
            MOVE_SPEED: 0.06, // Swift, punchy glide
            ROT_SPEED: 0.08,  // Snappy responsive turning
            targetMove: { x: 5, z: 5 },
            startMove: { x: 5, z: 5 },
            moveProgress: 1.0,
            
            targetRot: 0,
            startRot: 0,
            rotProgress: 1.0,
            
            bobPhase: 0, // Continuous velocity accumulator for head bobbing
            cameraRoll: 0, // dynamic Z-axis tilt
            
            keys: { w: false, a: false, s: false, d: false },

            init() {
                this.initControls();
                this.initComms();
                
                this.dungeonExists = false;
                
                // Wait for the master shell to broadcast the generated dungeon layout
                window.addEventListener('message', (e) => {
                    if (e.data && e.data.type === 'INIT_ENTITIES') {
                        this.mapData = e.data.mapData;
                        this.mobSpawns = e.data.spawns;
                        
                        // Dynamic Grid Dimensioning from FPV Layout
                        this.mapWidth = this.mapData.length;
                        this.mapHeight = this.mapData[0].length;

                        // Set initial player position from the FPV engine's entrance coordinates
                        this.player.x = e.data.playerSpawn?.x || 0;
                        this.player.z = e.data.playerSpawn?.z || 0;
                        this.targetMove.x = this.player.x * this.gridSize;
                        this.targetMove.z = this.player.z * this.gridSize;

                        this.dungeonExists = true;

                        // Now that we have the layout, build the 3D map view
                        this.initWebGL();
                        this.buildWorldGeometry();
                    }
                });
                
                // Tell the shell we are ready to receive the synchronized layout
                window.parent.postMessage({ type: 'MAP_ENGINE_READY' }, '*');
            },

            initWebGL() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x2a2a2a);

                // --- Map View Cinematic Lighting ---
                const mapAmbientBoost = new THREE.HemisphereLight(0xcce6ff, 0x666666, 0.9);
                this.scene.add(mapAmbientBoost);
                
                const mapDirectionalBoost = new THREE.DirectionalLight(0xfff0d8, 1.2);
                mapDirectionalBoost.position.set(10, 80, 20);
                this.scene.add(mapDirectionalBoost);
                
                const mapFlatAmbient = new THREE.AmbientLight(0xffffff, 0.35);
                this.scene.add(mapFlatAmbient);
                
                const mapCoolRim = new THREE.DirectionalLight(0x99bbff, 0.08);
                mapCoolRim.position.set(-20, 40, -30);
                this.scene.add(mapCoolRim);
                
                const mapDramaticSideLight = new THREE.DirectionalLight(0xff9933, 0.4);
                mapDramaticSideLight.position.set(-30, 40, 30);
                this.scene.add(mapDramaticSideLight);
                // Fog removed for the top-down Map View to ensure clear visibility from Y=150

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.set(this.player.x * this.gridSize, 1.6, this.player.z * this.gridSize); // Eye level
                this.camera.rotation.y = this.player.rot;

                const canvas = document.getElementById('map-canvas');
                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                // Perspective Map setup - Zoomed in "Toy" View
                const aspect = window.innerWidth / window.innerHeight;
                this.mapCamera = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
                // Position will be updated in animate() loop

                // Setup Layers for Map View
                // Layer 0: Default (Walls, Floors, Lights)
                // Layer 1: Ceiling (Hidden from map)
                // Layer 2: Map Markers
                this.mapCamera.layers.enable(0); // Map sees geometry
                this.mapCamera.layers.enable(2); // Map sees markers

                // --- Lighting for Map ---
                // We add simple lighting so the GLTF Avatar material is nicely lit.
                // The walls/floors use MeshBasicMaterial and will ignore this.
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
                ambientLight.layers.enable(0);
                ambientLight.layers.enable(2);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
                dirLight.position.set(10, 20, 10);
                dirLight.layers.enable(0);
                dirLight.layers.enable(2);
                
                this.scene.add(ambientLight);
                this.scene.add(dirLight);

                // Player Map Marker (Avatar)
                this.playerMarker = new THREE.Group();
                this.playerMarker.position.set(0, 0, 0); // Ground level
                this.playerMarker.layers.set(2);
                this.scene.add(this.playerMarker);

                const avatarGeo = new THREE.ConeGeometry(0.3, 1, 8);
                const avatarMat = new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.5 });
                const avatar = new THREE.Mesh(avatarGeo, avatarMat);
                
                // Lay it flat to point forward (-Z)
                avatar.rotation.x = Math.PI / 2;
                avatar.position.y = 0.5; // Lift up slightly
                
                avatar.layers.set(2);
                this.playerMarker.add(avatar);

                window.addEventListener('resize', () => {
                    const aspect = window.innerWidth / window.innerHeight;
                    if(this.mapCamera.isPerspectiveCamera) {
                        this.mapCamera.aspect = aspect;
                    } else {
                        // fallback if user switches back to orthographic
                        const frustumSize = 5;
                        this.mapCamera.left = -frustumSize * aspect / 2;
                        this.mapCamera.right = frustumSize * aspect / 2;
                        this.mapCamera.top = frustumSize / 2;
                        this.mapCamera.bottom = -frustumSize / 2;
                    }
                    this.mapCamera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                // Start Render Loop
                requestAnimationFrame(() => this.animate());
            },

            // Procedural Textures (Removed)
            // Flat shaded Map View relies on pure MeshBasicMaterial colors to eliminate 8-bit moiré aliasing.

            createDungeonWallTexture() {
                const canvas = document.createElement("canvas");
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "#f5f5f5";
                ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = "rgba(0,0,0,0.03)";
                for (let i = 0; i < 1000; i++) {
                    ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
                }
                ctx.strokeStyle = "#3a2d1e";
                ctx.lineWidth = 24;
                ctx.strokeRect(0, 0, 256, 256);
                ctx.lineWidth = 10;
                for (let i = 48; i < 256; i += 48) {
                    ctx.beginPath();
                    ctx.moveTo(i, 12);
                    ctx.lineTo(i, 244);
                    ctx.stroke();
                }
                for (let i = 64; i < 256; i += 64) {
                    ctx.beginPath();
                    ctx.moveTo(12, i);
                    ctx.lineTo(244, i);
                    ctx.stroke();
                }
                return new THREE.CanvasTexture(canvas);
            },

            createDungeonFloorTexture() {
                const size = 512;
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");

                ctx.fillStyle = "#d2b48c"; // Tan stone color
                ctx.fillRect(0, 0, size, size);

                const imageData = ctx.getImageData(0, 0, size, size);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const randomFactor = (Math.random() - 0.5) * 15;
                    data[i]   += randomFactor; 
                    data[i+1] += randomFactor; 
                    data[i+2] += randomFactor;
                }
                ctx.putImageData(imageData, 0, 0);

                ctx.strokeStyle = 'rgba(139, 90, 43, 0.5)';
                ctx.lineWidth = 2;
                const step = size / 8;
                for(let i = step; i < size; i += step) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
                }

                ctx.strokeStyle = '#8b5a2b';
                ctx.lineWidth = 12;
                const inset = 6;
                ctx.strokeRect(inset, inset, size - inset * 2, size - inset * 2);

                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                return tex;
            },

            buildWorldGeometry() {
                // Initialize geometry container to prevent "children of undefined" crashes on reset
                if (!this.worldGroup) {
                    this.worldGroup = new THREE.Group();
                }

                // Clear old geometry
                while (this.worldGroup.children.length > 0) {
                    this.worldGroup.remove(this.worldGroup.children[0]);
                }

                const floorTex = this.createDungeonFloorTexture();
                const wallTex = this.createDungeonWallTexture();

                // Neumorphic map materials (Solid colors that match FPV + Standard shading)
                const mats = {
                    floor: new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 1.0, metalness: 0.0 }), // Tan
                    ceil: new THREE.MeshBasicMaterial({ color: '#111111' }),
                    wall: new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 1.0, metalness: 0.0 }), // Off-white

                    npc: new THREE.MeshStandardMaterial({ color: '#4ade80', roughness: 0.4 }),
                    monster: new THREE.MeshStandardMaterial({ color: '#f87171', roughness: 0.4 })
                };

                // Merge geometry for insane performance (instead of 1000s of distinct meshes)
                // NEW: Walls are 2 cubes high
                const wallGeo = new THREE.BoxGeometry(this.gridSize, this.gridSize * 2, this.gridSize);
                
                // Instanced Mesh is best, but for a simple demo, a group is fine
                for (let x = 0; x < this.mapWidth; x++) {
                    for (let z = 0; z < this.mapHeight; z++) {
                        const cell = this.mapData[x]?.[z];
                        if (!cell) continue;

                        if (cell.type === 'wall') {
                            const wall = new THREE.Mesh(wallGeo, mats.wall);
                            wall.position.set(x * this.gridSize, this.gridSize, z * this.gridSize);
                            this.worldGroup.add(wall);
                        }
                    }
                }
                
                // Ceiling is completely omitted in MapView so we can see into the dungeon

                // Floor
                const floorGeo = new THREE.PlaneGeometry(this.mapWidth * this.gridSize, this.mapHeight * this.gridSize);
                const floor = new THREE.Mesh(floorGeo, mats.floor);
                floor.rotation.x = -Math.PI / 2;
                floor.position.set((this.mapWidth * this.gridSize)/2 - this.gridSize/2, 0, (this.mapHeight * this.gridSize)/2 - this.gridSize/2);
                this.worldGroup.add(floor);

                // Dynamic Mob Rendering
                const mobGeo = new THREE.BoxGeometry(1, 2, 1);
                let monCount = 0; let npcCount = 0;
                
                const buildEntity = (sp, isMon, mesh) => {
                    const id = isMon ? `mon_${++monCount}` : `npc_${++npcCount}`;
                    sp.id = id; // Keep track of ID to send to AI worker
                    mesh.userData = { id, type: isMon ? 'enemy' : 'gambler', hp: sp.hp };
                    
                    if (isMon) {
                        // Goblins have bottom origins, place flush with floor
                        mesh.position.set(sp.x * this.gridSize, 0, sp.z * this.gridSize);
                        
                        // Add Status Circle under feet (White for IDLE, Red for AGGRO)
                        const circleGeo = new THREE.CircleGeometry((this.gridSize / 2) * 0.9, 32);
                        const circleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2, depthWrite: false }); // Soft white outline
                        const circle = new THREE.Mesh(circleGeo, circleMat);
                        circle.rotation.x = -Math.PI / 2;
                        circle.position.y = 0.01; // Slightly above floor to prevent z-fighting
                        mesh.add(circle);
                        
                        mesh.userData.baseMat = circleMat; // Save reference for coloring later
                        this.testMonster = mesh;
                    } else {
                        // NPC boxes are centered, place at y=1
                        mesh.position.set(sp.x * this.gridSize, 1, sp.z * this.gridSize);
                        this.testNPC = mesh;
                    }

                    this.worldGroup.add(mesh);
                };

                // Map Radar Entity Spawning
                this.mobSpawns.forEach(sp => {
                    if (sp.type === 'monster') {
                        const mesh = new THREE.Mesh(mobGeo, mats.monster);
                        buildEntity(sp, true, mesh);
                    } else if (sp.type === 'npc') {
                        const mesh = new THREE.Mesh(mobGeo, mats.npc);
                        buildEntity(sp, false, mesh);
                    }
                });

                this.scene.add(this.worldGroup);
            },

            initControls() {
                // Receive keyboard polling state from the Shell
                window.addEventListener('message', (event) => {
                    const data = event.data;
                    if (!data || !data.type) return;

                    if (data.type === 'KEY_DOWN') {
                        const k = data.key.toLowerCase();
                        if (k === 'w' || data.key === 'ArrowUp') this.keys.w = true;
                        if (k === 'a' || data.key === 'ArrowLeft') this.keys.a = true;
                        if (k === 's' || data.key === 'ArrowDown') this.keys.s = true;
                        if (k === 'd' || data.key === 'ArrowRight') this.keys.d = true;
                    } else if (data.type === 'KEY_UP') {
                        const k = data.key.toLowerCase();
                        if (k === 'w' || data.key === 'ArrowUp') this.keys.w = false;
                        if (k === 'a' || data.key === 'ArrowLeft') this.keys.a = false;
                        if (k === 's' || data.key === 'ArrowDown') this.keys.s = false;
                        if (k === 'd' || data.key === 'ArrowRight') this.keys.d = false;
                    }
                });
            },


            tryMove(dir) {
                // dir: 1 (forward), -1 (backward)
                const movePx = Math.round(Math.sin(this.targetRot));
                const movePz = Math.round(Math.cos(this.targetRot));
                
                const nextX = this.player.x - (movePx * dir);
                const nextZ = this.player.z - (movePz * dir);

                if (this.isValidSpace(nextX, nextZ)) {
                    this.startMove.x = this.player.x * this.gridSize;
                    this.startMove.z = this.player.z * this.gridSize;
                    
                    this.player.x = nextX;
                    this.player.z = nextZ;
                    
                    this.targetMove.x = this.player.x * this.gridSize;
                    this.targetMove.z = this.player.z * this.gridSize;
                    this.moveProgress = 0.0;
                    
                    // Notify AI Brain we moved
                    this.postToAI({ type: 'PLAYER_MOVE', x: this.player.x, z: this.player.z });
                    return true;
                } else if (dir === 1) {
                    // Auto-Corner Assist: If holding forward into a wall, check sides to automatically pan the camera
                    const leftPx = Math.round(Math.sin(this.targetRot + Math.PI/2));
                    const leftPz = Math.round(Math.cos(this.targetRot + Math.PI/2));
                    const rightPx = Math.round(Math.sin(this.targetRot - Math.PI/2));
                    const rightPz = Math.round(Math.cos(this.targetRot - Math.PI/2));

                    const canGoLeft = this.isValidSpace(this.player.x - leftPx, this.player.z - leftPz);
                    const canGoRight = this.isValidSpace(this.player.x - rightPx, this.player.z - rightPz);

                    // If exactly ONE path is open around the corner, automatically pan towards it
                    // The isVisuallyIdle check in animate() prevents movement until the pan is complete
                    if (canGoLeft && !canGoRight) {
                        this.targetRot += Math.PI / 2;
                    } else if (canGoRight && !canGoLeft) {
                        this.targetRot -= Math.PI / 2;
                    }
                }
                return false;
            },

            isValidSpace(x, z) {
                if(x < 0 || x >= this.mapWidth || z < 0 || z >= this.mapHeight) return false;
                if(this.mapData[x]?.[z]?.type === 'wall') return false;
                
                // Basic entity collision check
                if (this.testNPC) {
                    const eX = Math.round(this.testNPC.position.x / this.gridSize);
                    const eZ = Math.round(this.testNPC.position.z / this.gridSize);
                    if(x === eX && z === eZ) return false;
                }
                
                if (this.testMonster) {
                    const mX = Math.round(this.testMonster.position.x / this.gridSize);
                    const mZ = Math.round(this.testMonster.position.z / this.gridSize);
                    if(x === mX && z === mZ) return false;
                }
                
                return true;
            },


            initComms() {
                // Listen to UI Panels
                window.addEventListener('UI_ACTION', (e) => {
                    const action = e.detail ? e.detail.action : e.data ? e.data.action : null;
                    if (action === 'attack' && this.activeTarget === this.testMonster) {
                        // Forward the attack to the AI Brain (single source of truth)
                        this.postToAI({ type: 'PLAYER_ATTACK', targetId: this.testMonster.userData.id });
                    }
                    if (action === 'retreat') {
                        // Force player backward
                        this.tryMove(-1);
                    }
                });

                // Listen to AI Brain
                window.addEventListener('message', (e) => {
                    if (e.data && e.data.type === 'COMBAT_UPDATE') {
                        // Sync UI with the AI's math
                        document.getElementById('ui-frame').contentWindow.postMessage(
                            { type: 'SHOW_COMBAT', health: e.data.newHp }, 
                            '*'
                        );
                    } else if (e.data && e.data.type === 'AI_DEATH') {
                        // Remove monster if AI declares it dead
                        if (this.testMonster && e.data.id === this.testMonster.userData.id) {
                            this.worldGroup.remove(this.testMonster);
                            this.activeTarget = null;
                            document.getElementById('ui-frame').contentWindow.postMessage({ type: 'HIDE_ALL' }, '*');
                        }
                    } else if (e.data && e.data.type === 'AI_UPDATES') {
                        // Process commands from the A* brain
                        e.data.updates.forEach(up => {
                            const mesh = this.worldGroup.children.find(m => m.userData && m.userData.id === up.id);
                            if (mesh) {
                                if (up.action === 'MOVE') {
                                    // Normally we'd lerp this in the animate loop for smoothness,
                                    // but snapping to grid cells works for this retro grid crawler aesthetic.
                                    mesh.position.x = up.x * this.gridSize;
                                    mesh.position.z = up.z * this.gridSize;
                                }
                                
                                // Color the base circle based on AI State (Red for attacking/chasing, Soft White for idle)
                                if (up.state && mesh.userData.baseMat) {
                                    mesh.userData.baseMat.color.setHex(up.state === 'IDLE' ? 0xffffff : 0xff0000);
                                    mesh.userData.baseMat.opacity = (up.state === 'IDLE' ? 0.2 : 0.4);
                                }
                                this._forceRender = true;
                            }
                        });
                    }
                });
            },

            postToAI(msg) {
                // The master shell intercepts this and routes it to the AI frame
                window.parent.postMessage(msg, '*');
            },

            // Main Loop
            animate() {
                if (!this.dungeonExists) return;
                
                // -----------------------------------------------------
                // VELOCITY-DRIVEN FLUID LOCOMOTION
                // -----------------------------------------------------
                
                // Keep targetRot normalized to prevent floating point drift creeping over hours of play
                while(this.targetRot > Math.PI) this.targetRot -= Math.PI*2;
                while(this.targetRot < -Math.PI) this.targetRot += Math.PI*2;
                
                // Prevent snapping by ensuring current rotation is proximate to target
                while (this.camera.rotation.y - this.targetRot > Math.PI) this.camera.rotation.y -= Math.PI*2;
                while (this.camera.rotation.y - this.targetRot < -Math.PI) this.camera.rotation.y += Math.PI*2;

                const distToTargetX = this.targetMove.x - this.camera.position.x;
                const distToTargetZ = this.targetMove.z - this.camera.position.z;
                const rotDiff = this.targetRot - this.camera.rotation.y;
                
                // Input Polling: Looser visually idle check allows holding Keys to process faster, eliminating "wait"
                const isVisuallyIdle = (Math.abs(distToTargetX) < 0.3 && Math.abs(distToTargetZ) < 0.3 && Math.abs(rotDiff) < 0.15);
                
                if (isVisuallyIdle) {
                    if (this.keys.w) this.tryMove(1);
                    else if (this.keys.s) this.tryMove(-1);
                    else if (this.keys.a) {
                        this.targetRot += Math.PI / 2;
                        this.keys.a = false; // Require tap for turning to prevent spinning out
                    }
                    else if (this.keys.d) {
                        this.targetRot -= Math.PI / 2;
                        this.keys.d = false; // Require tap for turning
                    }
                }
                
                // 1. Asymptotic Smooth Lerp (Responsive, snappier than the 0->1 math curve)
                this.camera.position.x += distToTargetX * this.MOVE_SPEED * 6; // Multiplier to maintain base speed
                this.camera.position.z += distToTargetZ * this.MOVE_SPEED * 6;
                this.camera.rotation.y += rotDiff * this.ROT_SPEED * 4;
                
                // ---------------------------------------------------------------------
                // RENDER PASS (Orthographic Map)
                // ---------------------------------------------------------------------
                
                // Track player with map camera smoothly (or instantly)
                const pitch = (85 * Math.PI) / 180;
                const dist = 18; // Toy map altitude distance
                
                this.mapCamera.position.x = this.camera.position.x;
                this.mapCamera.position.y = dist * Math.sin(pitch);
                this.mapCamera.position.z = this.camera.position.z + dist * Math.cos(pitch);
                
                this.mapCamera.lookAt(this.camera.position.x, 0, this.camera.position.z);

                // Sync the player marker position
                if (this.playerMarker) {
                    this.playerMarker.position.x = this.camera.position.x;
                    this.playerMarker.position.z = this.camera.position.z;
                    this.playerMarker.rotation.y = this.camera.rotation.y; 
                }

                // Render fullscreen
                this.renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                this.renderer.setScissor(0, 0, window.innerWidth, window.innerHeight);
                this.renderer.setScissorTest(false);

                // Clear to background color
                this.renderer.setClearColor(0x2a2a2a, 1);
                
                if (!isVisuallyIdle || this._lastRenderRot !== this.camera.rotation.y || this._forceRender) {
                    this._lastRenderRot = this.camera.rotation.y;
                    this._forceRender = false;
                    
                    this.renderer.clearDepth(); 
                    this.renderer.clearColor(); 
                    this.renderer.render(this.scene, this.mapCamera);
                }

                requestAnimationFrame(() => this.animate());
            }
        };

        window.onload = () => Engine.init();

    </script>
</body>
</html>

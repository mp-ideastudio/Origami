<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Spectral - WOW Gaming HUD</title>
  <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Cinzel:wght@700&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* TACTICAL COLOR SYSTEM - WCAG 2.2 AAA COMPLIANT */
      --bg-panel: #DCE1E8; 
      --bg-circle: #f2f5f8; 
      --nm-shadow-dark: rgba(0, 0, 0, 0.18); 
      --nm-shadow-light: rgba(0, 0, 0, 0.05);
      --nm-shadow-inner: inset 2px 2px 5px rgba(0,0,0,0.12);
      --blue-gray-border: 0.25px solid rgba(0,0,0,0.15);
      
      /* Text Defaults (NO WHITE IN LIGHT MODE) */
      --color-text: #1a1a1a; 
      --color-text-dim: #44474a; 
      --bloom-color: rgba(0, 255, 208, 0.7);
    }

    body.dark-mode {
      --bg-panel: #1a1a1f;
      --bg-circle: #2c2c34;
      --nm-shadow-dark: #000000;
      --nm-shadow-light: rgba(0, 0, 0, 0.4);
      --nm-shadow-inner: inset 3px 3px 8px #000;
      --color-text: #ffffff;
      --color-text-dim: rgba(255,255,255,0.7);
      --blue-gray-border: 0.25px solid #37474f;
      --bloom-color: rgba(0, 255, 208, 1);
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      color: var(--color-text);
    }

    .combat-panel {
      width: 280px;
      height: 380px;
      background: var(--bg-panel);
      border: var(--blue-gray-border);
      border-radius: 10px;
      box-shadow: 4px 4px 12px var(--nm-shadow-dark);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    /* Left Panel Accent Bar */
    #left-panel::after {
        content: ''; position: absolute; left: 0; 
        top: 32%; height: 36%;
        width: 3.5px; background: rgba(168, 85, 247, 1); border-radius: 0 3px 3px 0;
        box-shadow: 0 0 5px rgba(168, 85, 247, 1);
        z-index: 5;
    }

    /* Right Panel Accent Bar */
    #right-panel::after {
        content: ''; position: absolute; left: 0; 
        top: 32%; height: 36%;
        width: 3.5px; background: rgba(251, 146, 60, 1); border-radius: 0 3px 3px 0;
        box-shadow: 0 0 5px rgba(251, 146, 60, 1);
        z-index: 5;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
      position: relative;
      z-index: 2;
    }

    .header-label {
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--color-text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--color-text);
      text-shadow: 0 2px 4px var(--nm-shadow-light);
      letter-spacing: 0.02em;
    }

    body.dark-mode .header-title {
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .status-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      color: var(--color-text-dim);
      font-weight: 800;
      margin-bottom: 2px;
    }

    .health-bar-container {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--bg-circle);
      box-shadow: var(--nm-shadow-inner);
    }

    .health-bar-fill {
      height: 100%;
      width: 75%;
      background: #fb923c;
      border-radius: 3px;
    }

    .health-bar-fill.safe {
       background: #4ade80;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      background: var(--bg-circle);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      color: var(--color-text-dim);
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      text-transform: uppercase;
      box-shadow: var(--nm-shadow-inner);
    }

    .action-button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: var(--blue-gray-border);
      background: var(--bg-panel);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      color: var(--color-text);
      cursor: pointer;
      position: relative;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 2px 2px 5px var(--nm-shadow-dark);
    }

    .action-button:active {
      transform: scale(0.98);
      box-shadow: var(--nm-shadow-inner);
    }

    /* Accent colors for buttons */
    .btn-parley { color: #4ade80; }
    .btn-dice { color: #22d3ee; }
    .btn-hint { color: #a1a1aa; }
    
    .btn-engage { color: #fb923c; }
    .btn-retreat { color: #a1a1aa; }
    .btn-scan { color: #22d3ee; }
    
    body.dark-mode .btn-hint, body.dark-mode .btn-retreat {
        color: #d4d4d8;
    }

    .health-bar-container-right {
        margin-top: 6px; 
        margin-bottom: 12px;
    }

    .spacer {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .combat-icon-3d {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--bg-circle);
      border: var(--blue-gray-border);
      box-shadow: var(--nm-shadow-inner);
      position: relative;
    }

    #magic-renderer-container {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="magic-renderer-container"></div>

  <!-- Left Panel: PAX CONSOLE -->
  <div id="left-panel" class="combat-panel">
    <div class="panel-header">
      <span class="header-label">PAX CONSOLE</span>
      <span class="header-title">YAZUKA GOBLIN</span>
    </div>
    
    <div class="status-text">ALIVE • 1.0m • Parley 55%</div>
    
    <div class="health-bar-container">
      <div class="health-bar-fill safe"></div>
    </div>

    <!-- Spacer to push buttons down -->
    <div class="spacer">
      <div class="combat-icon-3d" data-symbol="ENEMY"></div>
    </div>

    <button class="action-button btn-parley">PARLEY (55%)</button>
    <button class="action-button btn-dice">DICE WAGER</button>
    <button class="action-button btn-hint">PUZZLE HINT</button>
  </div>

  <!-- Right Panel: ACTION RAIL -->
  <div id="right-panel" class="combat-panel">
    <div class="panel-header">
      <span class="header-label">ACTION RAIL</span>
      <span class="header-title">4/1 HP</span>
    </div>
    
    <div class="health-bar-container health-bar-container-right">
      <div class="health-bar-fill"></div>
    </div>

    <div class="chip-row">
      <div class="chip">AC 10</div>
      <div class="chip">1.0m</div>
      <div class="chip">ALIVE</div>
    </div>

    <!-- Spacer to push buttons down -->
    <div class="spacer">
      <div class="combat-icon-3d" data-symbol="SHIELD"></div>
    </div>

    <button class="action-button btn-engage">ENGAGE</button>
    <button class="action-button btn-retreat">RETREAT</button>
    <button class="action-button btn-scan">SCAN</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    // Message router for communicating with main parent
    window.addEventListener('message', (e) => {
        if (!e.data || !e.data.type) return;
        
        // Handle any incoming data to update panel state
        if (e.data.type === 'UPDATE_COMBAT_UI') {
            // (Target for dynamic updates from FPV/AI logic)
            console.log("Combat UI Data Received:", e.data);
        }
    });

    // Button event dispatchers
    document.querySelectorAll('.action-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const actionTarget = e.target.innerText.trim();
            window.parent.postMessage({ type: 'COMBAT_ACTION', action: actionTarget }, '*');
        });
    });

    // --- 3D RENDERING ENGINE ---
    let masterRenderer, masterCamera, masterScene;
    const magicScenes = {};
    
    function initMagic3DIcons() {
        const container = document.getElementById('magic-renderer-container');
        masterRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        masterRenderer.setPixelRatio(window.devicePixelRatio);
        masterRenderer.setSize(window.innerWidth, window.innerHeight);
        masterRenderer.autoClear = true;
        masterRenderer.setClearColor(0x000000, 0); 
        container.appendChild(masterRenderer.domElement);

        // True 1:1 CSS Pixel Mapping Orthographic Camera
        masterCamera = new THREE.OrthographicCamera(0, window.innerWidth, window.innerHeight, 0, -1000, 10000);
        masterCamera.position.set(0, 0, 1000);
        masterScene = new THREE.Scene();

        const elements = ['ENEMY', 'SHIELD'];
        
        elements.forEach(el => {
            let group = new THREE.Group(), updateFn = () => {};

            if (el === 'ENEMY') {
                // Hostile jagged pulsing shape
                const geom = new THREE.TorusKnotGeometry(0.35, 0.15, 64, 8, 2, 3);
                const mat = new THREE.MeshBasicMaterial({ color: 0xef4444, wireframe: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
                const knot = new THREE.Mesh(geom, mat);
                const coreMat = new THREE.MeshBasicMaterial({ color: 0x9333ea, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
                const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.2, 0), coreMat);
                group.add(knot, core);
                updateFn = (t) => {
                    knot.rotation.y = t * 0.8;
                    knot.rotation.z = t * 0.5;
                    core.rotation.x = -t * 1.2;
                    const pulse = 1 + Math.sin(t * 8) * 0.1;
                    knot.scale.set(pulse, pulse, pulse);
                    core.scale.set(pulse, pulse, pulse);
                };
            } else if (el === 'SHIELD') {
                // Serene protective cyan rings
                const rings = [];
                const mat = new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
                for(let i=0; i<3; i++) {
                    const r = new THREE.Mesh(new THREE.TorusGeometry(0.35 + i*0.12, 0.02, 16, 64), mat);
                    r.rotation.x = Math.PI/2;
                    group.add(r); rings.push(r);
                }
                const coreMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
                const core = new THREE.Mesh(new THREE.OctahedronGeometry(0.25, 0), coreMat);
                group.add(core);
                updateFn = (t) => {
                    rings.forEach((r, idx) => {
                        r.rotation.x = Math.PI/2 + Math.sin(t * 2 + idx) * 0.3;
                        r.rotation.y = t * (1.5 - idx*0.3);
                    });
                    core.rotation.y = -t;
                };
            }
            
            group.position.set(-1000, -1000, 0);
            masterScene.add(group); 
            magicScenes[el] = { group, updateFn };
        });

        window.addEventListener('resize', () => {
            masterRenderer.setSize(window.innerWidth, window.innerHeight);
            masterCamera.right = window.innerWidth;
            masterCamera.top = window.innerHeight;
            masterCamera.updateProjectionMatrix();
        });

        function magicLoop() {
            const t = Date.now() * 0.001;

            elements.forEach(el => {
               if (magicScenes[el]) magicScenes[el].group.position.set(-1000, -1000, 0); 
            });

            const circles = document.querySelectorAll('.combat-icon-3d');
            
            circles.forEach(circle => {
                const elType = circle.dataset.symbol;
                const sceneData = magicScenes[elType];
                if(!sceneData) return;

                const rect = circle.getBoundingClientRect();
                
                // Only render if roughly visible
                if(rect.bottom > 0 && rect.top < window.innerHeight && rect.right > 0 && rect.left < window.innerWidth) {
                    const centerX = rect.left + rect.width / 2;
                    const centerY = window.innerHeight - (rect.top + rect.height / 2);
                    
                    sceneData.group.position.set(centerX, centerY, 0);
                    
                    // Base scale of 1 matches exactly to a 100px circle. Our circles are 140px.
                    const scaleMultiplier = rect.width * 0.65;
                    sceneData.group.scale.setScalar(scaleMultiplier);

                    sceneData.updateFn(t);
                }
            });

            masterRenderer.render(masterScene, masterCamera);
            requestAnimationFrame(magicLoop);
        }
        requestAnimationFrame(magicLoop);
    }
    
    // Boot Engine
    initMagic3DIcons();
  </script>
</body>
</html>

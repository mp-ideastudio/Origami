<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Origami - Core Engine</title>
    <!-- State of the art WebGL Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- Post-Processing Pipeline -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/OutlinePass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/RGBShiftShader.js"></script>
    <!-- Combat Engine: Loaded AFTER Three.js + DOM so constructor can find #fct-container -->
    <script src="js/fpv/Combat.js" defer></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Game Container: Fluid Flexbox Architecture */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 3D WebGL Canvas Layer */
        #fpv-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }





        /* Movement Controls - Fluid Golden Placement */
        #movement-pad {
            position: absolute;
            z-index: 50;
            display: grid;
            grid-template-areas: 
              ". up ."
              "left . right"  
              ". down .";
            gap: 1.5vmin;
            /* Golden minor anchoring for bottom left */
            bottom: clamp(15px, 3vh, 30px);
            left: clamp(15px, 3vw, 30px);
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }

        #movement-pad:hover { opacity: 1; }
        
        .move-btn {
            width: clamp(44px, 12vmin, 64px); 
            height: clamp(44px, 12vmin, 64px); 
            border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(30, 35, 45, 0.95); 
            color: #fff; 
            font-size: clamp(18px, 5vmin, 28px); 
            cursor: pointer;
            box-shadow: 
                0 6px 16px rgba(0,0,0,0.6),
                inset 1px 1px 2px rgba(255, 255, 255, 0.1);
            transition: background 0.1s, transform 0.1s;
            -webkit-user-select: none;
            user-select: none;
        }
        .move-btn:active { 
            transform: scale(0.92); 
            background: rgba(50, 55, 65, 0.95); 
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5);
        }
        
        #btn-up { grid-area: up; } #btn-down { grid-area: down; }
        #btn-left { grid-area: left; } #btn-right { grid-area: right; }

        /* Hidden IFrames for UI and AI */
        .logic-frame {
            position: absolute;
            border: none;
            pointer-events: none;
            z-index: 100;
        }
        
        /* Fluid overlay for UI adhering to Golden Ratio height limit */
        #ui-frame {
            bottom: 0px;
            left: 0px;
            width: 100%;
            height: clamp(300px, 61.8vh, 1200px); /* Primary Golden Ratio rule for UI prominence */
        }

        #ai-frame { display: none; } /* Strictly headless logic */

        /* Interaction prompt (temporary center screen) */
        #interaction-prompt {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 30px; border-radius: 8px;
            border: 1px solid #ffd700; font-weight: bold; font-size: 1.2rem;
            z-index: 80; display: none; pointer-events: none;
        }
        
        #ui-frame { pointer-events: none; display: none !important; }

        /* Realtime Tuning Panel */
        #tuning-panel {
            display: none;
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-family: monospace;
            z-index: 1000;
            width: 200px;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }
        #tuning-panel h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .tune-row {
            margin-bottom: 10px;
        }
        .tune-row label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .tune-row input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        #fps-counter {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #00ffcc; padding: 4px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.3); font-family: monospace; font-size: 0.9rem;
            z-index: 90; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none;
            -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
        }
        #moonphase-label {
            position: absolute; top: 46px; left: 50%; transform: translateX(-50%);
            color: #888; font-family: monospace; font-size: 0.75rem; font-weight: 600;
            letter-spacing: 1px; z-index: 90; text-shadow: 0 1px 2px #000; pointer-events: none;
        }

        #turn-counter {
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.6); color: #ffcc00; padding: 6px 16px; border-radius: 6px;
            border: 1px solid rgba(255, 204, 0, 0.4); font-family: 'Inter', sans-serif; font-size: 1.1rem;
            z-index: 90; font-weight: 800; letter-spacing: 0.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none;
            -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
            text-transform: uppercase;
        }
        /* Floating Combat Text (WoW Style) */
        #fct-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5000;
            overflow: hidden;
        }

        .combat-text {
            position: absolute;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 3px 3px 5px rgba(0,0,0,0.8);
            animation: fctFloatUp 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            transform-origin: center center;
            opacity: 0;
            z-index: 5001;
        }

        .combat-text.hit { color: #ffffff; font-size: 48px; font-weight: 900; letter-spacing: 2px;}
        .combat-text.crit { color: #ffcc00; font-size: 72px; text-shadow: 0 0 15px rgba(255, 204, 0, 0.8), 3px 3px 0 #000; font-weight: 900; letter-spacing: 2px;}
        .combat-text.miss { color: #aaaaaa; font-size: 36px; font-weight: 900; letter-spacing: 2px;}
        .combat-text.damage { color: #ff3333; font-size: 64px; text-shadow: 0 0 15px rgba(255, 51, 51, 0.8), 3px 3px 0 #000; font-weight: 900; letter-spacing: 2px;}

        @keyframes fctFloatUp {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            15% { transform: translate(-50%, -60%) scale(1.3); opacity: 1; }
            30% { transform: translate(-50%, -65%) scale(1.0); opacity: 1; }
            80% { transform: translate(-50%, -100%) scale(1.0); opacity: 0.8; }
            100% { transform: translate(-50%, -120%) scale(0.8); opacity: 0; }
        }

        /* Asset Preloader - High-End / Next-Gen */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0b0e; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.4s ease-out;
        }
        .loader-content { text-align: center; color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.5); font-family: 'Inter', sans-serif; letter-spacing: 0.2rem; }
        .loader-content h2 { font-weight: 800; margin-bottom: 2rem; font-size: 1.5rem; text-transform: uppercase; }
        .progress-box { width: 350px; height: 6px; background: rgba(0, 255, 255, 0.1); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 3px; overflow: hidden; margin: 0 auto; box-shadow: 0 0 15px rgba(0,255,255,0.1) inset; }
        #loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0088ff, #00ffff); box-shadow: 0 0 15px #00ffff; transition: width 0.1s ease-out; }
        #loading-text { margin-top: 1rem; font-size: 0.9rem; font-weight: 600; font-family: monospace; }
        #loading-file { margin-top: 0.5rem; font-size: 0.65rem; color: rgba(0, 255, 255, 0.6); letter-spacing: 0.05rem; font-family: monospace; }
        /* Visceral Combat Overlay */
        .combat-dmg-text {
            position: absolute;
            z-index: 1000;
            font-size: clamp(34px, 7vmin, 58px);
            font-weight: 900;
            font-family: 'Impact', 'Courier New', Courier, monospace;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 0 8px 25px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: dmgFloat 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes dmgFloat {
            0% { transform: translate(-50%, -20%) scale(0.1) rotate(-10deg); opacity: 0; }
            15% { transform: translate(-50%, -80%) scale(1.4) rotate(5deg); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0) rotate(0deg); opacity: 1; }
            70% { transform: translate(-50%, -70%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(1.2); opacity: 0; }
        }

        /* ─── Goblin Slash Hit Overlay ─── */
        #slash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4999; overflow: hidden;
        }
        .slash-mark {
            position: absolute;
            top: 50%; left: 50%;
            width: 6px;
            border-radius: 3px;
            background: linear-gradient(180deg, #ff0000 0%, rgba(180,0,0,0.2) 100%);
            box-shadow: 0 0 12px 3px rgba(255,0,0,0.6), 0 0 3px rgba(255,255,255,0.4);
            transform-origin: top center;
            animation: slashDrop 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        @keyframes slashDrop {
            0%   { opacity: 0; transform: translate(-50%,-50%) scaleY(0) rotate(var(--r)); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scaleY(1) rotate(var(--r)); }
            60%  { opacity: 0.9; }
            100% { opacity: 0;  transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scaleY(1.1) rotate(var(--r)); }
        }

        /* Blood vignette that fires when player takes damage */
        #blood-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4998;
            box-shadow: inset 0 0 0 rgba(255,0,0,0);
            opacity: 0; transition: opacity 0.08s ease-out;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(200,0,0,0.55) 100%);
        }
        #blood-vignette.active { opacity: 1; }
        /* Mapview container using identical 10A AAA design */
        #mapview-container {
            position: absolute;
            top: 20px;
            left: 20px;
            height: clamp(250px, 30vh, 400px);
            width: clamp(250px, 30vh, 400px);
            min-width: 200px;
            min-height: 200px;
            border-radius: 18px;
            background: linear-gradient(145deg, #1a1a1e, #111114);
            padding: 6px;
            z-index: 1000;
            border: 1px solid rgba(180,140,60,0.25);
            box-sizing: border-box;
            cursor: move;
            transition: transform 0.3s ease;
            overflow: visible;
            -webkit-user-select: none;
            user-select: none;
        }

        #mapview-container:hover {
            border-color: rgba(200,150,60,0.35);
        }

        #mapview-container.dragging {
            cursor: grabbing !important;
            z-index: 1005 !important;
        }

        #mapview-container.resizing {
            transition: none;
        }

        #mapview-container:active {
            cursor: grabbing;
        }

        #mapview-container .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #0a0a0c;
        }

        /* Tilt-Shift / Diorama Spotlight Vignette */
        #mapview-container .canvas-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 40%, black 80%);
            mask-image: radial-gradient(circle at 50% 50%, transparent 40%, black 80%);
            pointer-events: none;
            z-index: 10;
        }



        #mapview-container .canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        /* Vertical zoom slider overlay for mapview */
        #mapview-container .zoom-slider-container {
            position: absolute; top: 50%; left: 10px;
            transform: translateY(-50%); 
            z-index: 50; pointer-events: auto;
        }
        #map-zoom-slider {
            width: 20px; height: 160px;
            writing-mode: vertical-lr; direction: rtl;
            background: rgba(20,20,20,0.6);
            border-radius: 6px;
            outline: none;
            cursor: ns-resize;
        }
        #map-zoom-slider::-webkit-slider-runnable-track {
            width: 6px; background: transparent; 
        }
        #map-zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: #00ffcc; border: 1px solid rgba(0,0,0,0.8);
            box-shadow: 0 0 5px #00ffcc;
        }



        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: transparent;
            z-index: 51;
            pointer-events: auto;
        }
        .resize-handle.se {
            bottom: 0;
            right: 0;
            cursor: se-resize;
        }
        .resize-handle.sw {
            bottom: 0;
            left: 0;
            cursor: sw-resize;
        }
        .resize-handle.ne {
            top: 0;
            right: 0;
            cursor: ne-resize;
        }
        .resize-handle.nw {
            top: 0;
            left: 0;
            cursor: nw-resize;
        }

        #mapview-container .view-label {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Roboto', sans-serif;
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 6;
        }
        
        /* -------------------------------- */
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Asset Preloading Screen -->
        <div id="loading-screen">
            <div class="loader-content">
                <h2>INITIALIZING WORLD ENGINE...</h2>
                <div class="progress-box">
                    <div id="loading-bar-fill"></div>
                </div>
                <div id="loading-text">0%</div>
                <div id="loading-file">Connecting to databanks...</div>
            </div>
        </div>

        <!-- 3D Scene Layer -->
        <canvas id="fpv-canvas"></canvas>

        <!-- Dedicated Layer for WoW style Combat Text -->
        <div id="fct-container"></div>
        <!-- Goblin Slash Hit VFX Overlay -->
        <div id="slash-overlay"></div>
        <!-- Blood vignette (player takes damage) -->
        <div id="blood-vignette"></div>
        <div id="interaction-prompt">Press E to Interact</div>
        <div id="fps-counter">FPS: --/60</div>
        <div id="moonphase-label">NEW MOON</div>



        <!-- UI Panels Layer (Loaded via Iframe to isolate CSS/JS overhead) -->
        <iframe id="ui-frame" title="Game UI Interface" class="logic-frame" src="NewOrigami.Panels.html" sandbox="allow-scripts allow-same-origin allow-modals" allowtransparency="true"></iframe>
        
    <!-- Realtime Tuning Panel -->
    <div id="tuning-panel">
        <h3>Movement Tuning</h3>
        <div class="tune-row">
            <label><span>Speed (W)</span><span id="val-speed">2.56</span></label>
            <input type="range" id="tune-speed" title="Speed" min="0.5" max="6.0" step="0.01" value="2.56">
        </div>
        <div class="tune-row">
            <label><span>Down-step (Bob)</span><span id="val-bob">0.045</span></label>
            <input type="range" id="tune-bob" title="Bob Amplitude" min="0.0" max="0.3" step="0.001" value="0.045">
        </div>
        <div class="tune-row">
            <label><span>Sway (Shift)</span><span id="val-sway">0.015</span></label>
            <input type="range" id="tune-sway" title="Sway Amplitude" min="0.0" max="0.1" step="0.001" value="0.015">
        </div>
    </div>

    <!-- AI Brain Layer (Headless) -->
        <iframe id="ai-frame" title="Game AI Brain" class="logic-frame" src="NewOrigamiAi.html" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <script>
        /**
         * CORE GAME ENGINE (Three.js integration + Application Coordinator)
         */
        const Engine = {
            // State
            player: { 
                x: 5, z: 5, rot: 0, hp: 100, maxHp: 100, gold: 0, shopDebt: 0, autoTurnTarget: null,
                level: 1, xp: 0, nextXp: 100,
                str: 16, dex: 14, con: 15, int: 10, wis: 10, cha: 12 
            },
            lootItems: [], // Tracks physical 3D drops
            boulders:   [], // Active boulder projectiles
            gridSize: 2,
            mapData: [],
            mapWidth: 40,   // Restored to 40x40 for FPS
            mapHeight: 40,  // Restored to 40x40 for FPS
            headlamp: null,
            outerGlow: null,
            clock: null,
            mixers: [],
            activeTarget: null, // NPC or Monster we are adjacent to
            frameCount: 0,
            
            // FCT: Floating Combat Text Spawner
            spawnCombatText(text, type = 'hit') {
                if (window.CombatEngine) window.CombatEngine.spawnCombatText(text, type);
            },

            // ── Goblin Slash Hit VFX ──────────────────────────────────────────
            // Spawns three animated claw-mark lines fanning across the screen center
            spawnSlashVFX() {
                const overlay = document.getElementById('slash-overlay');
                const vignette = document.getElementById('blood-vignette');
                if (!overlay) return;

                // Blood vignette pulse
                if (vignette) {
                    vignette.classList.add('active');
                    setTimeout(() => vignette.classList.remove('active'), 350);
                }

                // Three slash marks: left, centre, right
                const slashes = [
                    { r: '-50deg', tx: '-80px', ty: '-60px', h: '180px', delay: '0ms' },
                    { r: '-38deg', tx:   '0px', ty: '-90px', h: '220px', delay: '40ms' },
                    { r: '-26deg', tx:  '80px', ty: '-60px', h: '180px', delay: '80ms' },
                ];
                slashes.forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'slash-mark';
                    el.style.setProperty('--r',  s.r);
                    el.style.setProperty('--tx', s.tx);
                    el.style.setProperty('--ty', s.ty);
                    el.style.height = s.h;
                    el.style.animationDelay = s.delay;
                    overlay.appendChild(el);
                    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); });
                });
            },
            
            activeChat: null,
            
            generateRoomDescription(roomId) {
                const room = this.rooms.find(r => r.id === roomId);
                if (!room) return null;

                let desc = `[ROOM ${roomId}] `;

                if (roomId === 99) {
                    desc += "You have entered a strange, makeshift shop. Odd wares and ancient relics are scattered about.";
                } else if (roomId === 1) {
                    desc += `You stand at the entrance of Level ${this.level || 1}. The ancestral spirits watch you.`;
                } else {
                    const dojoDescs = [
                        "You step onto the woven tatami mats of a silent training hall. The smell of incense lingers.",
                        "Faded banners of forgotten samurai clans hang from the wooden rafters.",
                        "Bamboo practice swords lie scattered across the polished wooden floor.",
                        "A serene meditation chamber. Dust dances in the shafts of dim light.",
                        "The floor here is scarred with deep katana strikes from ancient duels.",
                        "A grand dojo room with a master's elevated platform at the far end.",
                        "Paper sliding doors (shoji) line the walls, though many are torn.",
                        "A martial arts weapons rack stands empty against the wall."
                    ];
                    desc += dojoDescs[roomId % dojoDescs.length];
                }

                // Check for stairs
                const hasStairsUp = this.mapData[room.center.x]?.[room.center.y - 2]?.type === 'stairs_up';
                const hasStairsDown = this.mapData[room.center.x]?.[room.center.y]?.type === 'stairs_down';
                if (hasStairsUp) {
                    desc += " A set of stone stairs leads back up.";
                }
                if (hasStairsDown) {
                    desc += " A dark stairwell descends deeper into the dungeon.";
                }

                // Check for mobs
                const mobsInRoom = this.mobs.filter(m => m.hp > 0 && Math.abs(m.x - room.center.x) < room.w/2 + 2 && Math.abs(m.z - room.center.y) < room.h/2 + 2);
                if (mobsInRoom.length > 0) {
                    const names = mobsInRoom.map(m => m.name || 'a monster');
                    const counts = {};
                    names.forEach(n => counts[n] = (counts[n] || 0) + 1);
                    const mobStrings = Object.entries(counts).map(([name, count]) => `${count} ${name}${count > 1 && !name.endsWith('s') ? 's' : ''}`);
                    
                    desc += ` You notice ${mobStrings.join(', ')} lurking nearby.`;
                } else if (roomId !== 99 && roomId !== 1) {
                    desc += " The room appears to be empty... for now.";
                }

                return desc;
            },

            syncPlayerStats() {
                window.parent.postMessage({ 
                    type: 'SYNC_STATS', 
                    hp: this.player.hp, 
                    maxHp: this.player.maxHp,
                    gold: this.player.gold, 
                    playerLevel: this.player.level,
                    xp: this.player.xp,
                    maxXp: this.player.nextXp,
                    str: this.player.str, dex: this.player.dex, con: this.player.con, 
                    int: this.player.int, wis: this.player.wis, cha: this.player.cha

                    this.player.level++;
                    this.player.xp -= this.player.nextXp;
                    this.player.nextXp = Math.floor(this.player.nextXp * 1.5);
                    
                    // Nethack style stat increment
                    const stats = ['str', 'dex', 'con', 'int', 'wis', 'cha'];
                    const boostStat = stats[Math.floor(Math.random() * stats.length)];
                    this.player[boostStat]++;

                    this.player.maxHp += hpBoost;
                    this.player.hp = this.player.maxHp; // Full heal on level up
                    
                    window.parent.postMessage({ type: 'LOG_EVENT', logType: 'system', text: `*** LEVEL UP! You are now Level ${this.player.level}! Your ${boostStat.toUpperCase()} increased! ***` }, '*');

            spawnChatBubble(enText, jpText, targetMesh) {
                const logText = jpText ? `${enText} [${jpText}]` : enText;
                window.parent.postMessage({ type: 'LOG_EVENT', text: logText, logType: 'chat' }, '*');
                if (this.activeChat) {
                    if (this.activeChat.mesh) {
                        this.scene.remove(this.activeChat.mesh);
                        // Clean up children (extrusion mesh, text mesh, light)
                        if (this.activeChat.mesh.children) {
                            this.activeChat.mesh.children.forEach(c => {
                                if (c.material && c.material.map) c.material.map.dispose();
                                if (c.material) c.material.dispose();
                                if (c.geometry) c.geometry.dispose();
                            });
                        }
                    }
                    this.activeChat = null;
                }

                const canvas = document.createElement('canvas');
                canvas.width = 1000;
                canvas.height = 1000;
                const ctx = canvas.getContext('2d');

                // Clear background completely transparent
                ctx.clearRect(0, 0, 1000, 1000);

                let enFontSize = 120;
                let enLines = [];
                let enLineHeight = 0;
                let enTotalHeight = 0;

                const MAX_WIDTH = 700;
                const MAX_HEIGHT = 450;
                
                // Scale English text until it fits
                while (true) {
                    ctx.font = `900 ${enFontSize}px "Impact", sans-serif`;
                    const words = enText.split(' ');
                    enLines = [];
                    let currentLine = words[0];

                    for (let i = 1; i < words.length; i++) {
                        const word = words[i];
                        const width = ctx.measureText(currentLine + " " + word).width;
                        if (width < MAX_WIDTH) {
                            currentLine += " " + word;
                        } else {
                            enLines.push(currentLine);
                            currentLine = word;
                        }
                    }
                    if (currentLine) enLines.push(currentLine);

                    enLineHeight = enFontSize * 1.15;
                    enTotalHeight = enLines.length * enLineHeight;
                    
                    if (enTotalHeight <= MAX_HEIGHT || enFontSize <= 24) {
                        let maxWordWidth = 0;
                        for (let l of enLines) {
                            maxWordWidth = Math.max(maxWordWidth, ctx.measureText(l).width);
                        }
                        if (maxWordWidth <= MAX_WIDTH || enFontSize <= 24) {
                            break;
                        }
                    }
                    enFontSize -= 2;
                }

                // Japanese Font sizing
                let jpFontSize = Math.min(32, enFontSize * 0.5);
                ctx.font = `bold ${jpFontSize}px sans-serif`;
                let jpLines = [];
                let currentJpLine = "";
                for (let char of (jpText || "")) {
                    let w = ctx.measureText(currentJpLine + char).width;
                    if (w < MAX_WIDTH * 0.95) {
                        currentJpLine += char;
                    } else {
                        jpLines.push(currentJpLine);
                        currentJpLine = char;
                    }
                }
                if (currentJpLine) jpLines.push(currentJpLine);
                
                let jpLineHeight = jpFontSize * 1.4;
                let jpTotalHeight = jpLines.length > 0 ? (jpLines.length * jpLineHeight) : 0;
                
                let totalContentHeight = enTotalHeight + (jpText ? (jpTotalHeight + 30) : 0);
                
                // Draw English Text
                ctx.fillStyle = '#000000';
                ctx.font = `900 ${enFontSize}px "Impact", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let startY = 500 - (totalContentHeight / 2) + (enFontSize / 2);
                let currentY = startY;
                
                for (let i = 0; i < enLines.length; i++) {
                    ctx.fillText(enLines[i], 500, currentY);
                    currentY += enLineHeight;
                }

                // Draw Japanese Subtitle
                if (jpText) {
                    currentY += (jpFontSize / 2);
                    ctx.fillStyle = '#444444';
                    ctx.font = `bold ${jpFontSize}px sans-serif`;
                    ctx.textBaseline = 'top';
                    for (let i = 0; i < jpLines.length; i++) {
                        ctx.fillText(jpLines[i], 500, currentY);
                        currentY += jpLineHeight;
                    }
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;

                const textMaterial = new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    transparent: true,
                    depthTest: false,
                    fog: false
                });

                // Perfect 2D Billboard Text Mesh
                const geometryPlane = new THREE.PlaneGeometry(3.6, 3.6);
                const textMesh = new THREE.Mesh(geometryPlane, textMaterial);
                textMesh.position.z = 0.50; // Push text firmly in front of the puffiest part of the balloon
                textMesh.renderOrder = 1000;

                // Custom 3D Comic Balloon Shape using ExtrudeGeometry
                const shape = new THREE.Shape();
                const bWidth = 4.2;   // Increased for padding buffer
                const bHeight = 2.8;  // Increased for padding buffer
                const bRad = 0.5;
                const tWidth = 0.4;
                const tHeight = 1.0; 
                const tOffset = 0.0; 

                // Start top left
                shape.moveTo(-bWidth/2 + bRad, bHeight/2);
                shape.lineTo(bWidth/2 - bRad, bHeight/2);
                shape.quadraticCurveTo(bWidth/2, bHeight/2, bWidth/2, bHeight/2 - bRad);
                shape.lineTo(bWidth/2, -bHeight/2 + bRad);
                shape.quadraticCurveTo(bWidth/2, -bHeight/2, bWidth/2 - bRad, -bHeight/2);
                
                // Bottom edge with tail pointing diagonally left towards the entity head
                shape.lineTo(tOffset + tWidth/2, -bHeight/2);
                shape.lineTo(tOffset - 3.5, -bHeight/2 - tHeight);    // Tip of tail stretched far left
                shape.lineTo(tOffset - tWidth/2, -bHeight/2);
                
                shape.lineTo(-bWidth/2 + bRad, -bHeight/2);
                shape.quadraticCurveTo(-bWidth/2, -bHeight/2, -bWidth/2, -bHeight/2 + bRad);
                shape.lineTo(-bWidth/2, bHeight/2 - bRad);
                shape.quadraticCurveTo(-bWidth/2, bHeight/2, -bWidth/2 + bRad, bHeight/2);

                const extrudeSettings = {
                    steps: 1,
                    depth: 0.15,
                    bevelEnabled: true,
                    bevelThickness: 0.25, // High bevel makes it look like a rounded cloud/pill
                    bevelSize: 0.2, 
                    bevelOffset: 0,
                    bevelSegments: 12 // Smooth curves
                };

                const balloonGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                
                // We use MeshStandardMaterial to get 3D shading, but with maximum roughness
                const balloonMat = new THREE.MeshStandardMaterial({ 
                    color: 0xdddddd,
                    roughness: 1.0, 
                    metalness: 0.0,
                    emissive: 0x050505, // Minimal glow to prevent bloom washout
                    depthWrite: true,
                    depthTest: true,
                    transparent: false,
                    fog: false
                });

                const balloonMesh = new THREE.Mesh(balloonGeo, balloonMat);
                balloonMesh.renderOrder = 999;
                
                const light = new THREE.PointLight(0xffffff, 0.15, 5);
                
                // Offset the meshes so the tip of the tail (-3.5, -bHeight/2 - tHeight, 0)
                // becomes the (0,0,0) origin of the Group container.
                // -bHeight/2 - tHeight = -1.4 - 1.0 = -2.4. So shift +3.5 X and +2.4 Y.
                balloonMesh.position.set(3.5, 2.4, -0.25);
                textMesh.position.set(3.5, 2.4, 0.50);
                light.position.set(3.5, 2.4, 1.0);

                const group = new THREE.Group();
                group.add(balloonMesh);
                group.add(textMesh);
                group.add(light);
                group.renderOrder = 999;
                
                // Scale the bubble so it's large enough to read from combat distance
                group.scale.set(0.45, 0.45, 0.45);
                
                this.scene.add(group);

                this.activeChat = {
                    mesh: group,
                    target: targetMesh,
                    light: light,
                    expires: Infinity, // Permanent until clicked or dismissed
                    fading: false
                };
            },
            
            triggerCombatSequence(target) {
                if (!target || target.userData.combatIntroTriggered) return;
                target.userData.combatIntroTriggered = true;

                // Goblin backs up 2 grids (20 feet)
                const dirX = -Math.sin(this.player.rot);
                const dirZ = -Math.cos(this.player.rot);
                
                target.userData.retreatX = target.position.x + (dirX * 2.0 * this.gridSize);
                target.userData.retreatZ = target.position.z + (dirZ * 2.0 * this.gridSize);
                target.userData.isRetreating = true;

                // Flanking Imps
                if (this.impCache && this.impCache.length >= 2) {
                    // Right vector
                    const rightX = Math.cos(this.player.rot);
                    const rightZ = -Math.sin(this.player.rot);

                    for(let i=0; i<2; i++) {
                        const impGltf = this.impCache[i];
                        const imp = impGltf.scene.clone(); // clone the cached scene
                        
                        const anchor = new THREE.Group();
                        anchor.add(imp);
                        
                        const sign = i === 0 ? -1 : 1;
                        anchor.position.set(
                            target.userData.retreatX + (rightX * 3.0 * sign * this.gridSize),
                            0, // Keep Y at 0 for now, float happens via baseY later
                            target.userData.retreatZ + (rightZ * 3.0 * sign * this.gridSize)
                        );
                        
                        anchor.scale.set(0.01, 0.01, 0.01);
                        anchor.userData = { 
                            type: 'imp', 
                            id: `imp_${Date.now()}_${i}`,
                            targetScale: 1.0,
                            baseY: 0
                        };
                        
                        // Animations
                        if (impGltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(imp);
                            const action = mixer.clipAction(impGltf.animations[0]);
                            action.play();
                            this.mixers.push(mixer);
                            anchor.userData.mixer = mixer;
                        }

                        // Glow Mats
                        imp.traverse((child) => {
                            if (child.isMesh) {
                                const mat = child.material.clone();
                                mat.transparent = false;
                                mat.opacity = 0.3;
                                mat.blending = THREE.NormalBlending;
                                mat.side = THREE.FrontSide;
                                mat.depthWrite = true;
                                if (mat.emissive !== undefined) {
                                    mat.emissive.set("#00ffcc");
                                    mat.emissiveIntensity = 0.4;
                                }

                                mat.onBeforeCompile = (shader) => {
                                    shader.fragmentShader = shader.fragmentShader.replace(
                                        '#include <emissivemap_fragment>',
                                        [
                                            '#ifdef USE_EMISSIVEMAP',
                                            '    vec4 emissiveMapColor = texture2D( emissiveMap, vUv );',
                                            '    totalEmissiveRadiance *= emissiveMapColor.rgb;',
                                            '#endif',
                                            'float baseBrightness = dot(diffuseColor.rgb, vec3(0.299, 0.587, 0.114));',
                                            'if (baseBrightness > 0.65) {', 
                                            '    totalEmissiveRadiance = vec3(2.0);', 
                                            '    diffuseColor.rgb = vec3(0.0);', 
                                            '}'
                                        ].join('\n')
                                    );
                                };
                                child.material = mat;
                                child.renderOrder = 10;
                            }
                        });
                        
                        // Copy Goblin's rotation
                        imp.rotation.y = -Math.PI / 2;
                        
                        let foundSkinned = false;
                        anchor.userData.glowMeshes = [];
                        anchor.traverse(n => {
                            if (n.isSkinnedMesh) {
                                anchor.userData.glowMeshes.push(n);
                                foundSkinned = true;
                            }
                        });
                        if (!foundSkinned) anchor.userData.glowMeshes.push(anchor);

                        this.worldGroup.add(anchor);
                    }
                }
            },

            // Uniformly scale an object so its total height equals targetHeight (in world units)

            scaleModelToHeight(object3D, targetHeight) {
                if (!object3D) return 1;
                object3D.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(object3D);
                const currentHeight = Math.max(1e-6, box.max.y - box.min.y);
                const s = targetHeight / currentHeight;
                object3D.scale.multiplyScalar(s);
                object3D.updateMatrixWorld(true);
                return s;

            updateCombatAI(delta) {
                // Player Tweening during combat moves
                if (this.combatState === 'player_moving' && this.targetTile) {
                    const dx = this.targetTile.x - this.player.x;
                    const dz = this.targetTile.z - this.player.z;
                    const dist = Math.hypot(dx, dz);
                    
                    if (dist < 0.1) {
                        this.player.x = this.targetTile.x;
                        this.player.z = this.targetTile.z;
                        this.targetTile = null;
                        this.combatState = 'monster_turn';
                        this.processMonsterTurn();
                    } else {
                        this.player.x += dx * 10 * delta;
                        this.player.z += dz * 10 * delta;
                        
                        this.player.isWalking = true;
                        this.bobTimer += delta * 12.0;
                        this.bobHeight = Math.sin(this.bobTimer) * this.BOB_AMP;
                        this.bobSway = Math.sin(this.bobTimer * 0.5) * this.SWAY_AMP;
                        
                        this.camera.position.set(this.player.x + this.bobSway, this.player.y + this.bobHeight, this.player.z);
                    }
                }

                // Monster Tweening
                this.worldGroup.children.forEach(child => {
                    if (child.userData && child.userData.targetMove) {
                        const dx = child.userData.targetMove.x - child.position.x;
                        const dz = child.userData.targetMove.z - child.position.z;
                        if (Math.hypot(dx, dz) < 0.1) {
                            child.position.x = child.userData.targetMove.x;
                            child.position.z = child.userData.targetMove.z;
                            child.userData.targetMove = null;
                            if (child.userData.onMoveComplete) {
                                child.userData.onMoveComplete();
                                child.userData.onMoveComplete = null;
                            }
                        } else {
                            child.position.x += dx * 5 * delta;
                            child.position.z += dz * 5 * delta;
                            // Re-aim monster to look at player while walking
                            child.lookAt(this.player.x, child.position.y, this.player.z);
                        }
                    }
                });
            },
            
            executeCombatMove(dir) {
                if (this.combatState !== 'player_turn' || this.targetTile !== null) return;
                
                const moveDist = this.gridSize * dir;
                
                // Discretize player rotation to nearest 90 degrees so we move in strict grid tiles
                const snapRot = Math.round(this.player.rot / (Math.PI / 2)) * (Math.PI / 2);
                
                let tx = this.player.x - Math.sin(snapRot) * moveDist;
                let tz = this.player.z - Math.cos(snapRot) * moveDist;
                
                let gridX = Math.round(tx / this.gridSize);
                let gridZ = Math.round(tz / this.gridSize);
                
                if (this.isValidGridSpace(gridX, gridZ)) {
                    this.targetTile = { x: gridX * this.gridSize, z: gridZ * this.gridSize };
                    this.combatState = 'player_moving';
                }
            },
            
            async processMonsterTurn() {
                const hostiles = [];
                this.worldGroup.children.forEach(child => {
                    if (child.userData && child.userData.type === 'enemy' && child.userData.isHostile && !child.userData.isDead) {
                        hostiles.push(child);
                    }
                });
                
                if (hostiles.length === 0) {
                    this.combatState = 'player_turn'; 
                    return;
                }
                
                for (let i = 0; i < hostiles.length; i++) {
                    const monster = hostiles[i];
                    if (monster.userData.isDead) continue; // might have died during previous monster's turn
                    
                    await new Promise(resolve => {
                        const eX = Math.round(monster.position.x / this.gridSize);
                        const eZ = Math.round(monster.position.z / this.gridSize);
                        const pX = Math.round(this.player.x / this.gridSize);
                        const pZ = Math.round(this.player.z / this.gridSize);
                        
                        const dist = Math.hypot(pX - eX, pZ - eZ);
                        
                        // Check if we need to drop combat due to distance
                        if (dist > 12.0) {
                            // Monster gives up chase
                            setTimeout(resolve, 100);
                            return;
                        }
                        
                        if (dist <= 1.5) {
                            // Melee Attack
                            const executeGoblinStrike = () => {
                                if (!monster.userData.isDead) {
                                    if (window.CombatEngine) window.CombatEngine.resolveMeleeStrike(monster.userData.name || 'Goblin', 10);
                                    this.player.hp = Math.max(0, this.player.hp - 10);
                                    this.syncPlayerStats();
                                    window.parent.postMessage({ type: 'LOG_EVENT', logType: 'damage', text: `${monster.userData.name || 'Goblin'} hit you for 10 DMG!` }, '*');
                                    this.addCameraTrauma(0.6);
                                }
                                setTimeout(resolve, 200); // slight pause after hit
                            };
                            
                            const mixer = monster.userData.mixer;
                            const slashAnim = monster.userData.attackAction;
                            if (mixer && slashAnim) {
                                mixer.stopAllAction();
                                slashAnim.reset();
                                slashAnim.setLoop(THREE.LoopOnce, 1);
                                slashAnim.clampWhenFinished = true;
                                slashAnim.play();
                                setTimeout(executeGoblinStrike, 300); // Sync hit with animation frame
                            } else {
                                setTimeout(executeGoblinStrike, 300);
                            }
                        } else {
                            // Move 1 tile towards player
                            const path = this.findPath(eX, eZ, pX, pZ);
                            if (path && path.length > 1) {
                                const nextNode = path[1];
                                monster.userData.targetMove = { 
                                    x: nextNode.x * this.gridSize, 
                                    z: nextNode.z * this.gridSize 
                                };
                                monster.userData.onMoveComplete = resolve;
                                
                                // Play walk animation if available
                                const mixer = monster.userData.mixer;
                                const walkAnim = monster.userData.walkAction;
                                if (mixer && walkAnim && walkAnim.isRunning() === false) {
                                    walkAnim.reset();
                                    walkAnim.setEffectiveWeight(1);
                                    walkAnim.play();
                                }
                            } else {
                                setTimeout(resolve, 100); // Can't move, skip turn
                            }
                        }
                    });
                }
                
                // Done iterating all monsters
                if (this.combatState === 'monster_turn') {
                    this.combatState = 'player_turn';
                }
            },

            // --- Baseline Procedural Textures ---
            makePaperTexture(baseColor) {
                const c = document.createElement('canvas'); c.width = c.height = 256; const ctx = c.getContext('2d');

                const tex = new THREE.CanvasTexture(c); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(8,8); return tex;
            },

            makeWoodTexture(baseColor) {
                const c = document.createElement('canvas'); c.width = c.height = 512; const ctx = c.getContext('2d');
                ctx.fillStyle = baseColor; ctx.fillRect(0,0,512,512);
                const plankH = 40;
                for (let y=0;y<512;y+=plankH){
                    ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(0,y,512,plankH/2);
                    ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(0,y+plankH/2,512,plankH/2);
                    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,y+plankH-1,512,1);
                }
                for (let i=0;i<700;i++){
                    const y = Math.random()*512; const len = 40+Math.random()*120; const x = Math.random()*512; const a = Math.random()*0.12;
                    ctx.strokeStyle = `rgba(255,255,255,${a*0.5})`; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(Math.min(512,x+len), y+Math.sin(y*0.05)*2); ctx.stroke();
                    ctx.strokeStyle = `rgba(0,0,0,${a})`; ctx.beginPath(); ctx.moveTo(x,y+2); ctx.lineTo(Math.min(512,x+len), y+2+Math.sin((y+2)*0.05)*2); ctx.stroke();
                }

            createDungeonWallTexture() {

                }
                ctx.strokeStyle = "#3a2d1e";
                ctx.lineWidth = 24;
                ctx.strokeRect(0, 0, 256, 256);
                ctx.lineWidth = 10;
                for (let i = 48; i < 256; i += 48) {
                    ctx.beginPath();
                    ctx.moveTo(i, 12);
                    ctx.lineTo(i, 244);
                    ctx.stroke();
                }
                for (let i = 64; i < 256; i += 64) {

            createDungeonFloorTexture() {
                const size = 512;
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");

                ctx.fillStyle = "#d2b48c"; // Tan stone color
                ctx.fillRect(0, 0, size, size);

                const imageData = ctx.getImageData(0, 0, size, size);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const randomFactor = (Math.random() - 0.5) * 15;
                    data[i]   += randomFactor; 
                    data[i+1] += randomFactor; 
                    data[i+2] += randomFactor;
                }
                ctx.putImageData(imageData, 0, 0);

                ctx.strokeStyle = 'rgba(139, 90, 43, 0.5)';
                ctx.lineWidth = 2;
                const step = size / 8;
                for(let i = step; i < size; i += step) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
                }

                ctx.strokeStyle = '#8b5a2b';
                ctx.lineWidth = 12;
                const inset = 6;
                ctx.strokeRect(inset, inset, size - inset * 2, size - inset * 2);

                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                return tex;
            },

            createDarkWoodRafterTexture() {
                const size = 512;

            buildWorldGeometry() {
                // Initialize geometry container to prevent "children of undefined" crashes on reset
                if (!this.worldGroup) {
                    this.worldGroup = new THREE.Group();
                }

                while (this.worldGroup.children.length > 0) {

                const ceilTex = this.createDarkWoodRafterTexture();

                const mats = {
                    floor: new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.9, metalness: 0.1 }),
                    ceil: new THREE.MeshStandardMaterial({ map: ceilTex, color: 0xFFFFFF, roughness: 1.0, metalness: 0.0 }),
                    wall: new THREE.MeshStandardMaterial({ map: wallTex, color: 0xFFFFFF, roughness: 0.8, metalness: 0.0 }),

                    wallTop: new THREE.MeshStandardMaterial({ map: wallTopTex, color: 0xE6E6E6, roughness: 0.9, metalness: 0.0 }),
                    npc: new THREE.MeshStandardMaterial({ color: '#7cfc00', map: objTex, roughness: 0.6 }),
                    monster: new THREE.MeshStandardMaterial({ color: '#b85450', map: objTex, roughness: 0.6 })
                };
                this.mats = mats;

                const wallMaterials = [
                    mats.wall,    // Right
                    mats.wall,    // Left
                    mats.wallTop, // Top (Custom Neumorphic Dungeon Top)
                    mats.wall,    // Bottom
                    mats.wall,    // Front
                    mats.wall     // Back
                ];

                const pipWallMaterials = [
                    mats.pipWall,    // Right
                    mats.pipWall,    // Left
                    mats.wallTop,    // Top
                    mats.pipWall,    // Bottom
                    mats.pipWall,    // Front
                    mats.pipWall     // Back
                ];

                // Merge geometry for insane performance (instead of 1000s of distinct meshes)
                // NEW: Walls are 1.33 cubes high                // 1. Grid Walls
                const wallHeight = this.gridSize * 1.53;
                const wallGeo = new THREE.BoxGeometry(this.gridSize, wallHeight, this.gridSize);
                
                const isExposed = (x, z) => {
                    for(let dx=-1; dx<=1; dx++) {
                        for(let dz=-1; dz<=1; dz++) {
                            const nx = x+dx, nz = z+dz;
                            if (nx>=0 && nx<this.mapWidth && nz>=0 && nz<this.mapHeight) {
                                if (this.mapData[nx]?.[nz]?.type !== 'wall') return true;
                            }
                        }
                    }
                    return false;
                };

                // 2. InstancedMesh for Insane Performance (1 draw call vs 2000+)
                let wallCount = 0;
                const PADDING = 20;
                for (let x = -PADDING; x < this.mapWidth + PADDING; x++) {
                    for (let z = -PADDING; z < this.mapHeight + PADDING; z++) {
                        const isMapArea = x >= 0 && x < this.mapWidth && z >= 0 && z < this.mapHeight;
                        const type = isMapArea ? this.mapData[x]?.[z]?.type : 'wall';
                        if (type === 'wall') wallCount++;
                    }
                }

                const instancedWalls = new THREE.InstancedMesh(wallGeo, wallMaterials, wallCount);
                instancedWalls.castShadow = true;
                instancedWalls.receiveShadow = true;
                instancedWalls.frustumCulled = false; // Prevent clipping when Map view pulls far out

                const pipInstancedWalls = new THREE.InstancedMesh(wallGeo, pipWallMaterials, wallCount);
                pipInstancedWalls.frustumCulled = false;
                pipInstancedWalls.layers.set(3); // Force PiP only

                // Save reference so the raycaster can find it later without filtering the scene graph
                this.walls = [instancedWalls]; 
                
                // AAA Architectural Trim (Crown Molding / Lip for Wall Tops)
                // Removed per user request to maintain clean top-down map aesthetic without brown blockers!

                // Build pure mathematical AABB boxes for perfect Raycasting fallback
                this.wallBoxes = [];
                for (let x = 0; x < this.mapWidth; x++) {
                    for (let z = 0; z < this.mapHeight; z++) {
                        if (this.mapData[x]?.[z]?.type === 'wall' && isExposed(x, z)) {
                            const minX = x * this.gridSize - (this.gridSize / 2);
                            const maxX = x * this.gridSize + (this.gridSize / 2);
                            const minZ = z * this.gridSize - (this.gridSize / 2);
                            const maxZ = z * this.gridSize + (this.gridSize / 2);
                            this.wallBoxes.push(new THREE.Box3(
                                new THREE.Vector3(minX, -1, minZ), // Floor overlap
                                new THREE.Vector3(maxX, wallHeight + 1, maxZ)
                            ));
                        }
                    }
                }

                const dummy = new THREE.Object3D();
                let wallIdx = 0;

                for (let x = -PADDING; x < this.mapWidth + PADDING; x++) {
                    for (let z = -PADDING; z < this.mapHeight + PADDING; z++) {
                        const isMapArea = x >= 0 && x < this.mapWidth && z >= 0 && z < this.mapHeight;
                        const type = isMapArea ? this.mapData[x]?.[z]?.type : 'wall';

                        if (type === 'wall') {
                            dummy.position.set(x * this.gridSize, wallHeight / 2, z * this.gridSize);
                            dummy.updateMatrix();
                            instancedWalls.setMatrixAt(wallIdx, dummy.matrix);
                            pipInstancedWalls.setMatrixAt(wallIdx, dummy.matrix);
                            
                            wallIdx++;
                        }
                    }
                }
                
                instancedWalls.instanceMatrix.needsUpdate = true;
                pipInstancedWalls.instanceMatrix.needsUpdate = true;
                this.worldGroup.add(instancedWalls);
                this.worldGroup.add(pipInstancedWalls);
                
                // --- 3. Rounded Wall Edge Fillets ("Dug Out" effect) ---

                ceiling.layers.set(2); // Layer 2: Exclusive FPV rendering, hid from map view
                this.worldGroup.add(ceiling);

                // Tactical Grid Floor: Instead of one massive plane, we use thick procedural tiles
                let walkCount = 0;
                for (let x = 0; x < this.mapWidth; x++) {
                    for (let z = 0; z < this.mapHeight; z++) {
                        if (this.mapData[x]?.[z]?.type !== 'wall') walkCount++;
                    }
                }
                
                const depth = 0.001; // Eliminate massive floor edges to clean up the Isometric view
                // 1.0 scale creates perfectly flush seamless architecture

                instancedFloor.receiveShadow = true; 
                instancedFloor.frustumCulled = false;
                
                let walkIdx = 0;
                for (let x = 0; x < this.mapWidth; x++) {
                    for (let z = 0; z < this.mapHeight; z++) {
                        const cell = this.mapData[x]?.[z];
                        if (!cell || cell.type === 'wall' || cell.type.startsWith('stairs')) continue;
                        
                        dummy.position.set(x * this.gridSize, -depth / 2, z * this.gridSize);
                        dummy.updateMatrix();
                        instancedFloor.setMatrixAt(walkIdx++, dummy.matrix);
                    }
                }
                instancedFloor.instanceMatrix.needsUpdate = true;
                this.worldGroup.add(instancedFloor);
                
                // --- ROOM NUMBERS (Samurai Dojo Theme) ---
                if (this.rooms) {
                    this.rooms.forEach((room) => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 256; canvas.height = 256;

                }
                
                // --- 2.6 Build Stairways ---
                const stairGeo = new THREE.BoxGeometry(0.8, 0.4, 0.8);
                const stairUpMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.1 });
                const stairDownMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });

                            // Deep black void at the bottom of the stairwell

                };

                // Load replacement monster model directly from user's remote GitHub repository
                const TARGET_ENEMY_MODEL = './assets/models/YakuzaGoblinGhost.2.glb';
                
                const gltfLoader = new THREE.GLTFLoader();

                // Generate Ethereal Cinematic Mist Texture
                const mistCanvas = document.createElement('canvas');

                mGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                mCtx.fillStyle = mGrad;
                mCtx.fillRect(0, 0, 128, 128);
                const mistTex = new THREE.CanvasTexture(mistCanvas);

                // Preload Flanking Imps
                this.impCache = [];
                for (let i = 0; i < 2; i++) {
                    gltfLoader.load('./assets/models/yakuza.imp.animated.glb', (gltf) => {
                        this.impCache.push(gltf);
                    });
                }

                this.mobSpawns.forEach((sp, idx) => {
                    // Preserve NPC/gambler type - only default to 'monster' if not explicitly set
                    if (!sp.type || sp.type === 'goblin') sp.type = 'monster';
                    
                    let targetModel = TARGET_ENEMY_MODEL;
                    if (sp.model === 'shopkeeper') {
                        targetModel = './assets/models/Ninja.Skeleton.glb';

                    gltfLoader.load(targetModel, (gltf) => {
                        // We use the raw scene directly since each spawn gets its own 'load' call (cached by browser)
                        const goblin = gltf.scene;
                        const entityWrapper = new THREE.Group();
                        entityWrapper.add(goblin);
                        
                        if (sp.model === 'shopkeeper') {
                            // Add 3D Apron to the Skeleton
                            const apronGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.8, 16, 1, true, -Math.PI / 2, Math.PI);
                            const apronMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, side: THREE.DoubleSide });
                            const apronMesh = new THREE.Mesh(apronGeo, apronMat);

                            goblin.add(apronMesh);

                        // Initialize Animation Pipeline
                        if (gltf.animations && gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(goblin);
                            const actions = gltf.animations.map(a => mixer.clipAction(a));
                            
                            // Sequencer: 4=Bow, 2=Laugh, 0=Idle, 3=Look Around 
                            // Sequence: Bow -> Idle -> Look Around -> Laugh -> repeat
                            const seqIndices = [4, 0, 3, 2];
                            let currentSeqStep = 0;
                            
                            const playNextAnim = () => {
                                mixer.stopAllAction();
                                // Bounds safety check in case gltf models differ
                                const idx = seqIndices[currentSeqStep] % actions.length;
                                const act = actions[idx];
                                if (act) {
                                    act.reset();
                                    act.setLoop(THREE.LoopOnce, 1);
                                    act.clampWhenFinished = true;
                                    act.play();
                                }
                                currentSeqStep = (currentSeqStep + 1) % seqIndices.length;
                            };
                            
                            mixer.addEventListener('finished', playNextAnim);
                            playNextAnim(); // Kick off the loop immediately
                            
                            this.mixers.push(mixer);
                            entityWrapper.userData.mixer = mixer;
                            entityWrapper.userData.clips = gltf.animations;
                            entityWrapper.userData.actions = actions;
                            
                            // Find specific Attack Action by Name (Prioritize Slash as requested by User)
                            const slashClip = gltf.animations.find(a => a.name.toLowerCase().includes('slash'));
                            const attackClip = slashClip || gltf.animations.find(a => a.name.toLowerCase().match(/attack|strike|swing/));
                            entityWrapper.userData.attackAction = attackClip ? mixer.clipAction(attackClip) : actions[1];
                            
                            // Debug animation names to Event Log
                            let animNames = [];
                            gltf.animations.forEach((anim, i) => {
                                animNames.push(`[${i}] ${anim.name}`);

                            // window.parent.postMessage({ type: 'LOG_EVENT', text: 'Goblin Anims: ' + animNames.join(', '), logType: 'system' }, '*');
                        }
                        
                        
                        goblin.traverse((child) => {
                            if (child.isMesh) {
                                const nativeMat = child.material;
                                const matName = nativeMat.name ? nativeMat.name.toLowerCase() : "";
                                const meshName = child.name ? child.name.toLowerCase() : "";
                                
                                const eyeKeywords = ['eye', 'pupil', 'sclera', 'cornea', 'lens', 'iris'];
                                const isEye = eyeKeywords.some(kw => matName.includes(kw) || meshName.includes(kw));
                                
                                // Skip applying hologram transparency and neon color logic to the white eyes
                                if (!isEye) {
                                    // Apply neon cyan/green hologram rules directly to native material to preserve vertex colors and maps
                                    const applyHoloLayer = (mat) => {
                                        mat.transparent = true;  // Ghostbusters translucent spirit look
                                        mat.opacity = 0.55;       // 55% opacity — more solid, still ethereal
                                        mat.blending = THREE.NormalBlending;
                                        mat.side = THREE.FrontSide; // FrontSide only: DoubleSide caused back-face bleed-through 'double goblin' artifact
                                        mat.depthWrite = false;   // CRITICAL: prevents sorting artifacts on translucent mesh
                                        
                                        // Some native materials don't have emissive, so we check or fallback
                                        if (mat.emissive !== undefined) {
                                            mat.emissive.set(typeof Engine.fxConfig.emissiveColor === 'string' ? Engine.fxConfig.emissiveColor : "#00ffcc");
                                            mat.emissiveIntensity = Engine.fxConfig.emissiveIntensity;

                                        // Custom Shader Injection: Isolate bright white texture regions (the eyes) from being tinted by the hologram!
                                        mat.onBeforeCompile = (shader) => {
                                            shader.fragmentShader = shader.fragmentShader.replace(
                                                '#include <emissivemap_fragment>',

                                                    '#ifdef USE_EMISSIVEMAP',
                                                    '    vec4 emissiveMapColor = texture2D( emissiveMap, vUv );',
                                                    '    totalEmissiveRadiance *= emissiveMapColor.rgb;',
                                                    '#endif',
                                                    '// Check the brightness of the base texture map',
                                                    'float baseBrightness = dot(diffuseColor.rgb, vec3(0.299, 0.587, 0.114));',
                                                    'if (baseBrightness > 0.65) {', 
                                                    '    totalEmissiveRadiance = vec3(2.0); // Extreme white emissive override',
                                                    '    diffuseColor.rgb = vec3(0.0); // Zero out diffuse so red lights cannot reflect off it',
                                                    '}'
                                                ].join('\n')
                                            );
                                        };
                                    };

                                    if (Array.isArray(nativeMat)) {

                                        applyHoloLayer(nativeMat);
                                    }

                                    child.material = nativeMat;

                                // Fix Z-Index sorting issue against the red targeting circle
                                child.renderOrder = 10;

                        });

                        const frontLight = new THREE.PointLight(0xffffff, 4.0, this.gridSize * 1.5);
                        frontLight.position.set(0, 2.5, 1.5); // Above and in front (world +Z)
                        goblin.add(frontLight);

                        // Outline pass assignment moved to checkTriggers dynamically based on proximity
                        

                        buildEntity(sp, true, entityWrapper);
                    }, undefined, (primaryErr) => {

                                    const act = actions[i];

                                    currentSeqStep = (currentSeqStep + 1) % seqIndices.length;

                                mixer.addEventListener('finished', playNextAnim);

                                entityWrapper.userData.mixer = mixer;

                                const slashClip = fallbackGltf.animations.find(a => a.name.toLowerCase().includes('slash'));

                                entityWrapper.userData.attackAction = attackClip ? mixer.clipAction(attackClip) : actions[1];

                            // Apply hologram shader (same as primary load)

                    this.spawnLootCard = (x, z, catId, inTitle, desc, kanji, attr, isShopItem = false, price = 50) => {

                        const tex = new THREE.CanvasTexture(canvas);

                        // We use a Group to hold a Front and Back face, effectively creating a "solid" but ultra-thin card

                        // Add real 3D Model matching the UI panels
                        const createLootIcon = () => {

                            } else if (catId === 'FIRE') {

                                iconMesh.add(core);
                                const flames = [];
                                for(let i=0; i<60; i++) {
                                    const s = new THREE.Mesh(new THREE.TetrahedronGeometry(0.28, 0), new THREE.MeshStandardMaterial({ color: i % 3 === 0 ? 0xffea00 : (i % 2 === 0 ? 0xff4500 : 0xb71c1c), emissive: i % 3 === 0 ? 0xffea00 : 0xff4500, emissiveIntensity: 2.5, transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending, flatShading: true }));

                                customUpdate = (t) => {

                                        const r = Math.pow(h, 2.0) * 1.5 + 0.2;

            clearAutoWalk() {
                this.autoWalkPath = [];
                if (this.player.autoTurnTarget !== null && this.keys.w === false) {
                    this.player.autoTurnTarget = null;
                }
                if (this.pathVisualsGroup) {

                    }
                }

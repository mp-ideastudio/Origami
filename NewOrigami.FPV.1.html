                    // Use the walls array generated during buildWorldGeometry()
                    const walls = this.walls || [];

                    this.worldGroup.children.forEach(child => {
                        if (child.userData && child.userData.type === 'enemy') {
                            const model = child.children[0];
                            const aiData = this.mobSpawns.find(s => s.id === child.userData.id);
                            
                            // 1. Calculate Grid Distance to camera for Proximity Fading
                            const mPosV = new THREE.Vector3().copy(child.position);
                            mPosV.y += 1.0; 
                            const cPosV = new THREE.Vector3().copy(this.camera.position);
                            const distToPlayerGrid = cPosV.distanceTo(mPosV) / this.gridSize;

                            // Monsters are always visible — scene fog handles natural distance fade
                            child.visible = !child.userData.isDead;
                            let targetOpacity = this.fxConfig.baseOpacity;
                            
                            const isCombatTarget = this.activeTarget && this.activeTarget.userData && this.activeTarget.userData.id === child.userData.id;

                            if (model && child.visible) {
                                // Dynamic Translucency mapping
                                model.traverse((n) => {
                                    if (n.isMesh && n.material) {
                                        const mats = Array.isArray(n.material) ? n.material : [n.material];
                                        mats.forEach(mat => {
                                            if (mat.emissive && mat.emissive.getHex() === 0xffffff && mat.emissiveIntensity > 2.0) {
                                                if (targetOpacity <= 0.05) mat.opacity = 0.0; 
                                                else mat.opacity = 1.0;
                                            } else if (mat.name !== 'mist') { // Don't override mist physics
                                                mat.transparent = true;
                                                mat.opacity = Math.min(targetOpacity, 0.45); // Ghostly transparency request
                                                // Glass properties are now statically updated by the dat.gui onChange events
                                            }
                                        });
                                    }
                                });
                                
                                // Ethereal Float Engine
                                if (child.userData.bobPhase === undefined) child.userData.bobPhase = Math.random() * Math.PI * 2;
                                if (model.userData.baseY === undefined) model.userData.baseY = model.position.y;
                                
                                // "yakuza goblin needs to gently float up and down by 1 foot either direction" (1 foot = 0.1 units)
                                const isInteracting = (isCombatTarget || distToPlayerGrid <= 2.0);
                                const floatAmp = isInteracting ? 0.15 : 0.1; 
                                const floatOffset = isInteracting ? 1.0 : 0.1; // Gentle hover to prevent clipping
                                
                                // Lerp the model's Y position physically into the air relative to its original bounding box base
                                const targetY = model.userData.baseY + floatOffset + Math.sin(time * 2.0 + child.userData.bobPhase) * floatAmp;
                                model.position.y += (targetY - model.position.y) * 0.1;
                            }
                            
                            if (model && !child.userData.mixer) {
                                // Swirl Mist Particles
                                if (child.userData.mistGroup) {
                                    child.userData.mistGroup.rotation.y += delta * 0.4; // Rotate entire cloud slowly
                                    child.userData.mistGroup.children.forEach(sprite => {
                                        sprite.position.y = 0.2 + Math.abs(Math.sin(time * sprite.userData.speed + sprite.userData.angleOffset)) * 1.5;
                                        const s = 3.0 + Math.sin(time * sprite.userData.speed * 2.0) * 1.2;
                                        sprite.scale.set(s, s, s);
                                        sprite.material.opacity = 0.6 + Math.sin(time * sprite.userData.speed) * 0.4;
                                    });
                                }
                            }
                            
                            if (!aiData) return;
                            
                            // Line of Sight Check (True 3D Raycaster as requested)
                            this._anim_mPos.copy(child.position);
                            this._anim_mPos.y += 1.0; // Aim at chest height
                            this._anim_cPos.copy(this.camera.position);
                            
                            const distToPlayer3D = this._anim_cPos.distanceTo(this._anim_mPos);
                            this._anim_dirToPlayer3D.subVectors(this._anim_cPos, this._anim_mPos).normalize();
                            this._anim_dirFromPlayer3D.subVectors(this._anim_mPos, this._anim_cPos).normalize();
                            
                            let hasLoS = true;
                            // Limit sight strictly to 40 feet (4 grids * approx dist)
                            if (distToPlayer3D > (4.0 * this.gridSize)) {
                                hasLoS = false;
                            } else {
                                this._anim_ray.set(this._anim_cPos, this._anim_dirFromPlayer3D);
                                // Mathematical AABB loop
                                for (const box of this.wallBoxes) {
                                    if (this._anim_ray.intersectBox(box, this._anim_target)) {
                                        if (this._anim_cPos.distanceTo(this._anim_target) < (distToPlayer3D - 0.5)) {
                                            hasLoS = false; // Blocked by wall AABB
                                            break;
                                        }
                                    }
                                }
                            }
                            
                            // 90-degree frontal arc check for the monster (Front is local +Z)
                            // Calculate if player is in front of the monster's current rotation
                            this._anim_mFacingDir.set(0, 0, 1);
                            this._anim_mFacingDir.applyAxisAngle(this._anim_upAxis, child.rotation.y);
                            const monsterDot = this._anim_dirToPlayer3D.dot(this._anim_mFacingDir);
                            
                            // If the monster is IDLE or RETURN, it can only spot the player if within frontal arc (~90 degrees -> dot > ~0.707)
                            if (hasLoS && monsterDot < 0.707 && (aiData.state === 'IDLE' || aiData.state === 'RETURN')) {
                                hasLoS = false; 
                            }

                            // State Machine Transitions
                            if (hasLoS) {
                                aiData.state = 'CHASE';
                                aiData.searchTimer = 0;
                            } else if (aiData.state === 'CHASE') {
                                aiData.state = 'SEARCH';
                                aiData.searchTimer = 0;
                            }
                            
                            // State Execution
                            let viewAngle = 0; // Where is the monster looking?
                            
                            if (aiData.state === 'CHASE') {
                                // Move towards player
                                const angle = Math.atan2(this._anim_dirToPlayer3D.x, this._anim_dirToPlayer3D.z);
                                // The model itself and the arrow face local +Z. Rotate wrapper to point +Z at player.
                                child.rotation.y = angle; 
                                
                                const dx = Math.sin(angle) * (aiData.speed * 0.75) * delta;
                                const dz = Math.cos(angle) * (aiData.speed * 0.75) * delta;
                                child.position.x += dx;
                                child.position.z += dz;
                                
                                // Circle remains static
                                if (child.userData.searchLight) child.userData.searchLight.intensity = 0;
                                
                            } else if (aiData.state === 'SEARCH') {
                                aiData.searchTimer += delta;
                                // Stand still, scan left and right
                                child.rotation.y += Math.sin(time * 2) * delta;
                                // Circle remains static
                                
                                if (child.userData.searchLight) child.userData.searchLight.intensity = 2.0;

                                if (aiData.searchTimer > 4.0) { // 4 seconds of searching
                                    aiData.state = 'RETURN';
                                }
                                
                            } else if (aiData.state === 'RETURN') {
                                this._anim_hPos.set(aiData.homeX * this.gridSize, 1.0, aiData.homeZ * this.gridSize);
                                this._anim_dirToHome.subVectors(this._anim_hPos, this._anim_mPos);
                                const distToHome = this._anim_dirToHome.length();
                                
                                if (distToHome < 0.5) {
                                    aiData.state = 'IDLE';
                                } else {
                                    this._anim_dirToHome.normalize();
                                    const angle = Math.atan2(this._anim_dirToHome.x, this._anim_dirToHome.z);
                                    child.rotation.y = angle;
                                    
                                    const dx = Math.sin(angle) * aiData.speed * delta;
                                    const dz = Math.cos(angle) * aiData.speed * delta;
                                    child.position.x += dx;
                                    child.position.z += dz;
                                }
                                
                                // Circle remains static
                                if (child.userData.searchLight) child.userData.searchLight.intensity = 0;
                                
                            } else {
                                // IDLE — Random Wander
                                if (child.userData.searchLight) child.userData.searchLight.intensity = 0;

                                // Initialize wandering state
                                if (child.userData.wanderTimer === undefined) {
                                    child.userData.wanderTimer = Math.random() * 2.0; // Stagger starts
                                    child.userData.wanderAngle = Math.random() * Math.PI * 2;
                                    child.userData.wanderDuration = 0;
                                    child.userData.wanderCooldown = 0;
                                }

                                if (child.userData.wanderCooldown > 0) {
                                    // Waiting before next wander
                                    child.userData.wanderCooldown -= delta;
                                } else if (child.userData.wanderDuration > 0) {
                                    // Actively wandering in a direction
                                    child.userData.wanderDuration -= delta;
                                    const wdx = Math.sin(child.userData.wanderAngle) * (aiData.speed * 0.25) * delta;
                                    const wdz = Math.cos(child.userData.wanderAngle) * (aiData.speed * 0.25) * delta;
                                    const nx = child.position.x / this.gridSize + wdx / this.gridSize;
                                    const nz = child.position.z / this.gridSize + wdz / this.gridSize;
                                    // Only move if next position is walkable (not a wall)
                                    const tileX = Math.round(nx);
                                    const tileZ = Math.round(nz);
                                    const isWalkable = this.mapData[tileX] && this.mapData[tileX][tileZ] && this.mapData[tileX][tileZ].type !== 'wall';
                                    if (isWalkable) {
                                        child.position.x += wdx;
                                        child.position.z += wdz;
                                        child.rotation.y = child.userData.wanderAngle;
                                    } else {
                                        // Hit a wall — reverse and set cooldown
                                        child.userData.wanderDuration = 0;
                                        child.userData.wanderCooldown = 0.5 + Math.random() * 1.0;
                                    }
                                } else {
                                    // Pick a new wander destination
                                    child.userData.wanderTimer -= delta;
                                    if (child.userData.wanderTimer <= 0) {
                                        // Pick a random cardinal or diagonal direction
                                        const dirs = [0, Math.PI / 2, Math.PI, -Math.PI / 2,
                                                       Math.PI / 4, -Math.PI / 4, 3 * Math.PI / 4, -3 * Math.PI / 4];
                                        child.userData.wanderAngle = dirs[Math.floor(Math.random() * dirs.length)];
                                        child.userData.wanderDuration = 0.6 + Math.random() * 0.8; // Walk 0.6–1.4s
                                        child.userData.wanderCooldown = 0;
                                        child.userData.wanderTimer = 2.0 + Math.random() * 3.0; // Wait 2–5s before next
                                    }
                                }
                            }
                            
                            // Keep circle black even when in active combat engagement
                        }
                    });
                }
                
                // ---------------------------------------------------------------------
                // RENDER PASSES
                // ---------------------------------------------------------------------
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                
                // Render FPV Frame — viewport/scissor now set per-mode inside the RENDER PASSES block below

                // --- ENTITY IDLE ANIMATIONS & COMBAT LEVITATION ---
                if (this.worldGroup) {
                    for (let i = 0; i < this.worldGroup.children.length; i++) {
                        const child = this.worldGroup.children[i];
                        
                        // Smooth Levitation Interpolation for Combat Intros (moves the "floor base" up)
                        if (child.userData && child.userData.targetY !== undefined) {
                            child.userData.baseY += (child.userData.targetY - child.userData.baseY) * 2.0 * delta;
                        }

                        // Goblin Retreat
                        if (child.userData.isRetreating) {
                            child.position.x += (child.userData.retreatX - child.position.x) * 4.0 * delta;
                            child.position.z += (child.userData.retreatZ - child.position.z) * 4.0 * delta;
                            child.userData.baseY += (1.0 - child.userData.baseY) * 2.0 * delta; // Float up
                            
                            if (Math.abs(child.position.x - child.userData.retreatX) < 0.1 && 
                                Math.abs(child.position.z - child.userData.retreatZ) < 0.1) {
                                child.userData.isRetreating = false;
                            }
                        }

                        // Imp positioning and floating
                        if (child.userData.type === 'imp') {
                            child.userData.baseY += (1.5 - child.userData.baseY) * 2.0 * delta;
                            
                            // Specific clock logic based on original design
                            child.position.y = child.userData.baseY + Math.sin(this.clock.getElapsedTime() * 2.0 + (child.userData.id.endsWith('_0') ? 0 : Math.PI)) * 0.2;
                            
                            // Face player constantly
                            const angle = Math.atan2(this.camera.position.x - child.position.x, this.camera.position.z - child.position.z);
                            child.rotation.y = angle;
                            
                            // Sync monster floor circle if alive
                            if (child.userData.monBase) {
                                child.userData.monBase.position.set(child.position.x, 0, child.position.z);
                                child.userData.monBase.rotation.y = child.rotation.y;
                            }
                        }
                        
                        // Slow ethereal ghost float for entities elevated off the floor (baseY > 0.05)
                        if (child.userData && child.userData.idlePhase !== undefined && child.userData.type !== 'player') {
                            const baseY = child.userData.baseY || 0;
                            if (baseY > 0.05) {
                                // Slow ghostly hover: 0.7hz, 0.35 amplitude — looks supernatural in the air
                                child.position.y = baseY + Math.sin(this.clock.getElapsedTime() * 0.7 + child.userData.idlePhase) * 0.35;
                            } else {
                                // Subtle idle floor bob when standing
                                child.position.y = baseY + Math.sin(this.clock.getElapsedTime() * 1.5 + child.userData.idlePhase) * 0.07;
                            }
                        }
                        
                        // Always sync base circle to floor — independent of Y float, never blinks
                        if (child.userData && child.userData.monBase) {
                            child.userData.monBase.position.set(child.position.x, 0, child.position.z);
                            child.userData.monBase.rotation.y = child.rotation.y;
                        }
                        
                        // Dice physics and garbage collection
                        if (child.userData && child.userData.isDice) {
                            child.position.x += child.userData.vX;
                            child.position.y += child.userData.vY;
                            child.position.z += child.userData.vZ;
                            child.userData.vY -= 0.005; // Gravity
                            
                            child.rotation.x += child.userData.rX;
                            child.rotation.y += child.userData.rY;
                            child.rotation.z += child.userData.rZ;
                            
                            // Fast floor collision
                            if (child.position.y < 0.15) {
                                child.position.y = 0.15;
                                child.userData.vY *= -0.6; // Bounce
                                child.userData.vX *= 0.8; // Ground friction
                                child.userData.vZ *= 0.8;
                                child.userData.rX *= 0.8;
                                child.userData.rY *= 0.8;
                                child.userData.rZ *= 0.8;
                            }
                            
                            child.userData.life -= (delta * 60); // decrement based on time/frames
                            if (child.userData.life <= 0) {
                                child.scale.multiplyScalar(0.9);
                                if (child.scale.x < 0.01) {
                                    this.worldGroup.remove(child);
                                    i--; // Adjust array index since element was removed
                                }
                            }
                        }
                        
                        // Spell impact particle physics & fade
                        if (child.userData && child.userData.isSpellParticle) {
                            child.position.x += child.userData.vX;
                            child.position.y += child.userData.vY;
                            child.position.z += child.userData.vZ;
                            child.userData.vY -= 0.006;
                            child.userData.vX *= 0.94;
                            child.userData.vZ *= 0.94;
                            child.userData.life--;
                            if (child.material) child.material.opacity = Math.max(0, child.userData.life / 45);
                            if (child.userData.life <= 0) {
                                if (child.material) child.material.dispose();
                                if (child.geometry) child.geometry.dispose();
                                this.worldGroup.remove(child); i--;
                            }
                        }

                        // --- ROCK FRAGMENT PHYSICS (boulder explosion debris) ---
                        if (child.userData?.isRockFrag) {
                            child.position.x += child.userData.vX * 0.016;
                            child.position.y += child.userData.vY * 0.016;
                            child.position.z += child.userData.vZ * 0.016;
                            child.userData.vY -= 0.008;   // gravity at ~60fps
                            child.userData.vX *= 0.98;
                            child.userData.vZ *= 0.98;
                            child.rotation.x  += child.userData.rX;
                            child.rotation.y  += child.userData.rY;
                            child.rotation.z  += child.userData.rZ;
                            if (child.position.y < 0.08) {
                                child.position.y  = 0.08;
                                child.userData.vY *= -0.18;   // low bounce — heavy debris
                                child.userData.vX *= 0.60;
                                child.userData.vZ *= 0.60;
                            }
                            child.userData.life--;
                            if (child.userData.life <= 0) {
                                if (child.material) child.material.dispose();
                                if (child.geometry) child.geometry.dispose();
                                this.worldGroup.remove(child); i--;
                            }
                        }

                        // --- WIND FRAGMENT PHYSICS (swirl explosion) ---
                        if (child.userData?.isWindFrag) {
                            if (child.userData.target && child.userData.target.position) {
                                child.userData.angle += child.userData.speed * 0.016;
                                child.position.x = child.userData.target.position.x + Math.cos(child.userData.angle) * child.userData.radius;
                                child.position.z = child.userData.target.position.z + Math.sin(child.userData.angle) * child.userData.radius;
                            }
                            child.position.y += 0.03; // rise up
                            child.rotation.x += 0.2;
                            child.rotation.y -= 0.3;
                            
                            child.userData.life--;
                            if (child.userData.life <= 0) {
                                if (child.material) child.material.dispose();
                                if (child.geometry) child.geometry.dispose();
                                this.worldGroup.remove(child); i--;
                            }
                        }
                    }
                }

                // Active Chat Bubble Tracking & Billboarding
                if (this.activeChat && this.activeChat.mesh && this.activeChat.target) {
                    const tPos = new THREE.Vector3();
                    this.activeChat.target.getWorldPosition(tPos);
                    
                    this.activeChat.mesh.position.copy(tPos);
                    // The origin of the chat group is the tip of its tail.
                    // Pin it lower down on the Gobin's body so it stays comfortably in the camera frame at close range.
                    this.activeChat.mesh.position.y += 0.8; 
                    
                    // Push chat bubble slightly towards the camera by 0.6 units so the tail tip points OUTSIDE the monster's face
                    const camPos = new THREE.Vector3();
                    this.camera.getWorldPosition(camPos);
                    const toCam = new THREE.Vector3().subVectors(camPos, tPos).normalize();
                    this.activeChat.mesh.position.addScaledVector(toCam, 0.6); 
                    
                    // Always face the player
                    this.activeChat.mesh.lookAt(camPos);

                    // --- Viewport Clamping ---
                    // Project the bubble's approximate center (offset from tail tip) to screen space
                    const bubbleCenter = this.activeChat.mesh.position.clone();
                    bubbleCenter.y += 1.2; // Approximate center of balloon above tail
                    const projected = bubbleCenter.clone().project(this.camera);
                    // projected.x and projected.y are in NDC [-1, 1]
                    const margin = 0.15; // Keep 15% margin from edges
                    const maxX = 1.0 - margin;
                    const maxY = 1.0 - margin;
                    
                    if (projected.x > maxX || projected.x < -maxX || projected.y > maxY || projected.y < -maxY) {
                        // Calculate how much to nudge in screen space
                        const clampedX = Math.max(-maxX, Math.min(maxX, projected.x));
                        const clampedY = Math.max(-maxY, Math.min(maxY, projected.y));
                        
                        // Unproject both to get the world-space delta
                        const clampedWorld = new THREE.Vector3(clampedX, clampedY, projected.z).unproject(this.camera);
                        const originalWorld = new THREE.Vector3(projected.x, projected.y, projected.z).unproject(this.camera);
                        
                        const nudge = new THREE.Vector3().subVectors(clampedWorld, originalWorld);
                        this.activeChat.mesh.position.add(nudge);
                    }

                    if (this.activeChat.fading) {
                        this.activeChat.mesh.scale.multiplyScalar(0.8);
                        if (this.activeChat.mesh.scale.x < 0.01) {
                            this.scene.remove(this.activeChat.mesh);
                            this.activeChat = null;
                        }
                    }
                }

                // --- Autonomous Monster Combat Logic ---
                // Hybrid Turn-Based System!
                // AI gets to move if player is moving OR if the player injected action time by using a card.
                if (currentlyMoving || this.actionTimePool > 0) {
                    this.updateCombatAI(delta);
                    if (!currentlyMoving && this.actionTimePool > 0) {
                        this.actionTimePool -= delta;
                        if (this.actionTimePool < 0) this.actionTimePool = 0;
                    }
                }

                // --- PROJECTILE PHYSICS ---
                for (let bi = this.boulders.length - 1; bi >= 0; bi--) {
                    const b = this.boulders[bi];

                    // Gravity arc if boulder
                    if (b.userData.isBoulder) {
                        b.userData.vY -= 18.0 * delta;
                    }
                    
                    b.position.x += b.userData.vX * delta;
                    b.position.y += b.userData.vY * delta;
                    b.position.z += b.userData.vZ * delta;

                    // Realistic rolling/spinning dynamically perpendicular to actual travel direction
                    const spd2D = Math.hypot(b.userData.vX, b.userData.vZ);
                    if (spd2D > 0.01) {
                        if (b.userData.type === 'SHURIKEN' || b.userData.isShuriken) {
                            if (b.children.length > 0) b.children[0].rotation.z -= 35.0 * delta;
                        } else if (b.userData.isBoulder) {
                            const dynamicSpinAxis = new THREE.Vector3(b.userData.vZ / spd2D, 0, -b.userData.vX / spd2D);
                            b.rotateOnWorldAxis(dynamicSpinAxis, spd2D * delta * 0.6);
                        } else if (b.userData.isWind) {
                            b.rotation.y += 20.0 * delta;
                        }
                    }

                    // Floor bounce (damped — heavy rock)
                    if (b.userData.isBoulder && b.position.y <= 0.55) {
                        b.position.y = 0.55;
                        if (b.userData.vY < -1.5) {
                            // Hard bounce
                            b.userData.vY = Math.abs(b.userData.vY) * 0.8; // More bouncy pinball!
                            b.userData.vX *= 0.95;
                            b.userData.vZ *= 0.95;
                        } else {
                            // Rolling on floor
                            b.userData.vY = 0;
                            b.userData.vX *= 0.99; // Less friction for pinball!
                            b.userData.vZ *= 0.99;
                        }
                    }

                    // Remove if completely stopped or fell off map
                    if (b.position.y < -5 || (b.position.y <= 0.55 && Math.hypot(b.userData.vX, b.userData.vZ) < 0.2)) {
                        this.scene.remove(b);
                        this.boulders.splice(bi, 1);
                        continue;
                    }

                    // Wall AABB collision check
                    const bGX = Math.round(b.position.x / this.gridSize);
                    const bGZ = Math.round(b.position.z / this.gridSize);
                    const bWallHit = (bGX < 0 || bGX >= this.mapWidth || bGZ < 0 || bGZ >= this.mapHeight)
                                  || (this.mapData[bGX]?.[bGZ]?.type === 'wall');

                    if (bWallHit) {
                        if (b.userData.isBoulder) {
                            // Pinball bounce normal based on which cell boundary we crossed
                            const cellCenterX = bGX * this.gridSize;
                            const cellCenterZ = bGZ * this.gridSize;
                            
                            const dx = b.position.x - cellCenterX;
                            const dz = b.position.z - cellCenterZ;
                            
                            if (Math.abs(dx) > Math.abs(dz)) {
                                // Hit the X-facing wall
                                b.userData.vX *= -1.0; // PERFECT BOUNCE!
                                b.position.x += b.userData.vX * delta * 2; // push out
                            } else {
                                // Hit the Z-facing wall
                                b.userData.vZ *= -1.0; // PERFECT BOUNCE!
                                b.position.z += b.userData.vZ * delta * 2;
                            }
                            // Spawn a tiny bit of dust/sparks on wall hit
                            this.spawnRockExplosion(b.position.clone());
                        } else {
                            // Missiles stick and disappear
                            this.spawnRockExplosion(b.position.clone());
                            this.scene.remove(b);
                            this.boulders.splice(bi, 1);
                            continue;
                        }
                    }

                    // Entity collision (1.1 world-unit hit radius)
                    let bHitEntity = false;
                    if (this.worldGroup) {
                        for (let ci = 0; ci < this.worldGroup.children.length; ci++) {
                            const child = this.worldGroup.children[ci];
                            if (child.userData?.type === 'enemy' && !child.userData.isDead) {
                                const dist2D = Math.hypot(b.position.x - child.position.x, b.position.z - child.position.z);
                                if (dist2D < 1.1) {
                                    if (b.userData.isShuriken || b.userData.type === 'SHURIKEN') {
                                        this.scene.remove(b);
                                        this.boulders.splice(bi, 1);
                                        
                                        const dmgMod = Math.min(1.0, b.userData.dmg / 50.0);
                                        const hitX = (Math.random() - 0.5) * (1.5 - dmgMod);
                                        const hitY = 0.5 + Math.random() * 1.5 + (dmgMod * 0.5);
                                        const hitZ = (Math.random() - 0.5) * (1.5 - dmgMod);
                                        
                                        b.position.set(hitX, hitY, hitZ);
                                        b.rotation.x += (Math.random() - 0.5);
                                        b.rotation.z += (Math.random() - 0.5);
                                        child.add(b);
                                        
                                        if (this.spawnCrosshair) this.spawnCrosshair(child, hitX, hitY, hitZ);
                                        
                                        this.flattenGoblin(child, b.userData.dmg);
                                        this.addCameraTrauma(0.1);
                                        bHitEntity = true;
                                        break;
                                    } else {
                                        const ep = b.position.clone();
                                        const isWind = b.userData.isWind;
                                        this.scene.remove(b);
                                        this.boulders.splice(bi, 1);
                                        this.flattenGoblin(child, b.userData.dmg);
                                        if (isWind) {
                                            this.spawnWindSwirl(child);
                                        } else {
                                            this.spawnRockExplosion(ep);
                                        }
                                        bHitEntity = true;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                    if (bHitEntity) continue;
                }

                // --- ITEM SPINS ---
                if (this.katanaRef) {
                    this.katanaRef.userData.floatTimer += delta;
                    this.katanaRef.position.y = this.katanaRef.userData.basePos + Math.sin(this.katanaRef.userData.floatTimer * 3.0) * 0.15;
                    this.katanaRef.rotation.y += delta * 0.8;
                }

                // --- PROCEDURAL LOOT PHYSICS ---
                if (this.lootItems && this.lootItems.length > 0) {
                    const pGridX = Math.round(this.player.x);
                    const pGridZ = Math.round(this.player.z);

                    for (let i = this.lootItems.length - 1; i >= 0; i--) {
                        const loot = this.lootItems[i];
                        loot.userData.floatTimer += delta;
                        loot.position.y = loot.userData.basePos + Math.sin(loot.userData.floatTimer * 2.5) * 0.18;
                        // All loot spins gracefully on Y axis
                        loot.rotation.y += delta * (loot.userData.type === 'loot_gold' ? 2.0 : 1.2);
                        
                        if (loot.userData.iconMesh) {
                            // Call the mirrored animation update logic
                            if (loot.userData.customUpdate) {
                                loot.userData.customUpdate(loot.userData.floatTimer);
                            } else {
                                // small flat pulse effect fallback
                                const s = 1.0 + Math.sin(loot.userData.floatTimer * 5.0) * 0.1;
                                loot.userData.iconMesh.scale.set(s,s,s);
                            }
                        }
                        
                        // Proximity Check (1.0 Tile Radius Auto-pickup)
                        const lX = loot.position.x / this.gridSize;
                        const lZ = loot.position.z / this.gridSize;
                        const distToLoot = Math.hypot(this.player.x - lX, this.player.z - lZ);

                        if (distToLoot <= 1.0) {
                            if (loot.userData.type === 'loot_gold') {
                                this.player.gold += loot.userData.value;
                                window.parent.postMessage({ type: 'LOG_EVENT', text: `Looted ${loot.userData.value} Gold!`, logType: 'system' }, '*');
                                this.syncPlayerStats();
                                this.triggerHitStop(20); // Small audio/visual bump
                            } else if (loot.userData.type === 'loot_cards') {
                                if (loot.userData.isShopItem) {
                                    this.player.shopDebt += loot.userData.price;
                                    window.parent.postMessage({ type: 'LOG_EVENT', text: `Shopkeeper watches you take the ${loot.userData.cardName} (${loot.userData.price} Gold).`, logType: 'system' }, '*');
                                } else {
                                    window.parent.postMessage({ type: 'LOG_EVENT', text: `Picked up ${loot.userData.cardName} card!`, logType: 'system' }, '*');
                                }
                                window.parent.postMessage({ type: 'ADD_CARD', card: loot.userData.cardName }, '*');
                                
                                // Clean up the physical model
                                this.triggerHitStop(40);
                                
                                // YOU GOT! Card Showcase Overlay
                                if (loot.userData.cardDataURL) {
                                    const pNode = document.createElement('div');
                                    pNode.style.cssText = "position:absolute; top:45%; left:50%; transform:translate(-50%, -50%); z-index:9000; text-align:center; pointer-events:none; animation: cardLootAnim 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;";
                                    pNode.innerHTML = `
                                        <h1 style="color:#00ffcc; font-size:62px; text-shadow:0 0 30px #00ffcc; margin-bottom: 20px; font-weight:900; letter-spacing:4px; font-family: 'Impact', sans-serif;">YOU GOT!</h1>
                                        <div style="position:relative; display:inline-block; margin:0 auto;">
                                            <img src="${loot.userData.cardDataURL}" style="width:240px; height:360px; border-radius:18px; box-shadow: 0 0 50px rgba(0,255,200,0.4);" />
                                            <div id="loot3dOverlay" style="position:absolute; top:58%; left:50%; transform:translate(-50%, -50%); width:120px; height:120px; border-radius:50%; overflow:hidden;"></div>
                                        </div>
                                    `;
                                    document.getElementById('game-container').appendChild(pNode);
                                    
                                    if (!document.getElementById('animStyleLoot')) {
                                        const s = document.createElement('style');
                                        s.id = 'animStyleLoot';
                                        s.innerHTML = `@keyframes cardLootAnim { 0% { opacity:0; transform:translate(-50%, -40%) scale(0.5); } 15% { opacity:1; transform:translate(-50%, -50%) scale(1.1); } 30% { transform:translate(-50%, -50%) scale(1); } 80% { opacity:1; transform:translate(-50%, -50%) scale(1); } 100% { opacity:0; transform:translate(-50%, -50%) scale(1.05); } }`;
                                        document.head.appendChild(s);
                                    }

                                    // Render miniature 3D model inside the card overlay
                                    if (loot.userData.iconMesh) {
                                        const miniContainer = document.getElementById('loot3dOverlay');
                                        const miniRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                                        miniRenderer.setSize(120, 120);
                                        miniContainer.appendChild(miniRenderer.domElement);
                                        
                                        const miniScene = new THREE.Scene();
                                        const miniCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                                        miniCamera.position.z = 3.5;
                                        
                                        const miniLight = new THREE.AmbientLight(0xffffff, 1.5);
                                        const miniPoint = new THREE.PointLight(0xffffff, 2.0);
                                        miniPoint.position.set(2, 2, 3);
                                        miniScene.add(miniLight, miniPoint);
                                        
                                        const clonedIcon = loot.userData.iconMesh.clone();
                                        clonedIcon.position.set(0, 0, 0);
                                        clonedIcon.scale.set(1.5, 1.5, 1.5); // Ensure it looks big and shiny in the card
                                        miniScene.add(clonedIcon);
                                        
                                        let animFrame;
                                        const renderMini = (time) => {
                                            animFrame = requestAnimationFrame(renderMini);
                                            const t = time * 0.001;
                                            if (loot.userData.customUpdate) {
                                                loot.userData.customUpdate(t);
                                                // Sync cloned rotation back from the original, or run logic directly on clone
                                                // It's safer to just spin the whole group for the overlay:
                                                clonedIcon.rotation.y = t * 2.0;
                                                clonedIcon.rotation.x = Math.sin(t * 3.0) * 0.2;
                                            } else {
                                                clonedIcon.rotation.y += 0.05;
                                                clonedIcon.rotation.x = Math.sin(t * 3.0) * 0.1;
                                            }
                                            miniRenderer.render(miniScene, miniCamera);
                                        };
                                        renderMini(performance.now());
                                        
                                        setTimeout(() => {
                                            cancelAnimationFrame(animFrame);
                                            miniRenderer.dispose();
                                        }, 2600);
                                    }
                                    
                                    setTimeout(() => pNode.remove(), 2500);
                                }
                            }
                            
                            this.worldGroup.remove(loot);
                            if (loot.material) loot.material.dispose();
                            if (loot.geometry) loot.geometry.dispose();
                            this.lootItems.splice(i, 1);
                        }
                    }
                }
                // --- FOG OF WAR REMOVED ---

                // ═══ RENDER PASSES (camera-mode aware) ════════════════════════════════
                if (!this._pipRect) this._pipRect = { width: 300, height: 300 };
                
                const pipW = Math.round(this._pipRect.width);
                const pipH = Math.round(this._pipRect.height);
                const pipLeft = Math.round(this._pipRect.left || 0); // Render directly behind the UI container
                const pipBottom = Math.max(0, Math.round(winH - (this._pipRect.top || 0) - pipH)); // Bottom offset for WebGL scissor
                const webglTop = Math.round(this._pipRect.top || 0); // Top coordinate for drawImage
                
                // PiP Scissor Boundary (with inset to slip under UI ring)
                const inset = 8;
                const safeX = pipLeft + inset;
                const safeY = pipBottom + inset;
                const safeW = pipW - (inset * 2);
                const safeH = pipH - (inset * 2);

                // Initialize the Depth Mask Scene (Run Once)
                if (!window._pipMaskScene) {
                    window._pipMaskScene = new THREE.Scene();
                    window._pipMaskCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                    const maskGeom = new THREE.PlaneGeometry(2, 2);
                    
                    // The depth-mask ring (writes depth, no color, outside the circle)
                    const maskMat = new THREE.ShaderMaterial({
                        depthWrite: true,
                        depthTest: true,
                        colorWrite: false, 
                        vertexShader: `
                            varying vec2 vUv;
                            void main() {
                                vUv = uv;
                                gl_Position = vec4(position.xy, -0.99, 1.0); 
                            }
                        `,
                        fragmentShader: `
                            varying vec2 vUv;
                            void main() {
                                if (distance(vUv, vec2(0.5)) < 0.495) discard;
                                gl_FragColor = vec4(1.0);
                            }
                        `
                    });
                    const maskMesh = new THREE.Mesh(maskGeom, maskMat);
                    maskMesh.frustumCulled = false;
                    window._pipMaskScene.add(maskMesh);
                    
                    // The background color dial (writes color, no depth, inside the circle)
                    const bgMat = new THREE.ShaderMaterial({
                        depthWrite: false, // Don't block the map terrain!
                        depthTest: false,
                        colorWrite: true,
                        vertexShader: `
                            varying vec2 vUv;
                            void main() {
                                vUv = uv;
                                gl_Position = vec4(position.xy, 0.99, 1.0); // Draw at the far back
                            }
                        `,
                        fragmentShader: `
                            varying vec2 vUv;
                            void main() {
                                if (distance(vUv, vec2(0.5)) > 0.495) discard;
                                gl_FragColor = vec4(0.06, 0.06, 0.08, 1.0); // Solid dark dial background
                            }
                        `
                    });
                    const bgMesh = new THREE.Mesh(maskGeom, bgMat);
                    bgMesh.frustumCulled = false;
                    window._pipMaskScene.add(bgMesh);
                }
                
                // Keep the 2D canvas size perfectly matched to the wrapper bounds * pixelRatio for Ultra HD resolution!
                const pr = this.renderer.getPixelRatio();
                const hdW = Math.max(1, Math.round(pipW * pr));
                const hdH = Math.max(1, Math.round(pipH * pr));
                
                if (this.pipCanvasEl && (this.pipCanvasEl.width !== hdW || this.pipCanvasEl.height !== hdH)) {
                    this.pipCanvasEl.width = hdW;
                    this.pipCanvasEl.height = hdH;
                    // Reset CSS style size so physical pixels scale down cleanly to logical pixels
                    this.pipCanvasEl.style.width = pipW + 'px';
                    this.pipCanvasEl.style.height = pipH + 'px';
                }

                // ── Update ortho zoom ──
                if (this.topDownCamera) {
                    this.topDownCamera.layers.enable(1);
                    this.topDownCamera.layers.enable(3); // Ensure Layer 3 (Map-only Avatar) is visible
                    const pGX = Math.round(this.player.x);
                    const pGZ = Math.round(this.player.z);
                    
                    // --- Room-Aware Diablo Camera ---
                    let camWX = this.player.x * this.gridSize;
                    let camWZ = this.player.z * this.gridSize;

                    // Detect if player is inside a room
                    let activeRoom = null;
                    for (const room of this.rooms) {
                        if (pGX >= room.x && pGX < room.x + room.w && pGZ >= room.y && pGZ < room.y + room.h) {
                            activeRoom = room;
                            break;
                        }
                    }

                    // Calculate camera parameters based on location
                    let targetFOV, targetHeight, targetBack, lookAtX, lookAtZ;

                    if (activeRoom) {
                        // ROOM MODE: Precisely frame entire room + 1 tile border
                        const roomCenterX = (activeRoom.x + activeRoom.w / 2) * this.gridSize;
                        const roomCenterZ = (activeRoom.y + activeRoom.h / 2) * this.gridSize;
                        const roomSpan = Math.max(activeRoom.w, activeRoom.h) + 2; // +1 tile each side
                        const roomWorldSize = roomSpan * this.gridSize; // Total world units to fit
                        
                        // Physically scale camera placement to lower height and pull further back for a sharper Diablo-style angled perspective
                        targetHeight = roomWorldSize * 0.75 * this._pipZoomScale;
                        targetBack = roomWorldSize * 0.65 * this._pipZoomScale; 
                        
                        // Calculate exact FOV to fit roomWorldSize in frame natively given the new hypotenuse distance
                        const camDist = Math.sqrt(targetHeight * targetHeight + targetBack * targetBack);
                        targetFOV = 2 * Math.atan((roomWorldSize * 0.65) / camDist) * (180 / Math.PI);
                        
                        lookAtX = roomCenterX;
                        lookAtZ = roomCenterZ;
                    } else {
                        // Increase dynamic angle for hallways as well (lower height, pushed back)
                        targetFOV = 48;
                        targetHeight = 22 * this._pipZoomScale;
                        targetBack = 12 * this._pipZoomScale;
                        lookAtX = camWX;
                        lookAtZ = camWZ;
                    }

                    // Smooth tracking & interpolation
                    const camTrackSpeed = Math.min(1, delta * 2.5);
                    if (this._pipOrthoTarget.cx === undefined) {
                        this._pipOrthoTarget.cx = lookAtX;
                        this._pipOrthoTarget.cz = lookAtZ;
                        this._pipFOV = targetFOV;
                        this._pipHeight = targetHeight;
                        this._pipBack = targetBack;
                    }
                    this._pipOrthoTarget.cx += (lookAtX - this._pipOrthoTarget.cx) * camTrackSpeed;
                    this._pipOrthoTarget.cz += (lookAtZ - this._pipOrthoTarget.cz) * camTrackSpeed;
                    this._pipFOV += (targetFOV - this._pipFOV) * camTrackSpeed;
                    this._pipHeight += (targetHeight - this._pipHeight) * camTrackSpeed;
                    this._pipBack += (targetBack - this._pipBack) * camTrackSpeed;

                    // Apply smoothed camera params
                    const aspect = (pipW > 0 && pipH > 0) ? (pipW / pipH) : 1;
                    this.topDownCamera.fov = this._pipFOV;
                    this.topDownCamera.aspect = aspect;
                    this.topDownCamera.updateProjectionMatrix();

                    // Initialize PiP orbit controls (north-up fixed — only compass dial rotates)
                    if (!this._pipRot) this._pipRot = { theta: 0, phi: 0.8 };
                    // theta intentionally NOT locked to player.rot — map stays north-up always
                    
                    // Use directly smoothed height and back offsets for fluid zoom/pan
                    const camPosY = this._pipHeight;
                    const mapXZRadius = this._pipBack;
                    
                    const camPosX = this._pipOrthoTarget.cx + Math.sin(this._pipRot.theta) * mapXZRadius;
                    const camPosZ = this._pipOrthoTarget.cz + Math.cos(this._pipRot.theta) * mapXZRadius;

                    // Offset camera forward so player appears near the bottom of the screen (only in hallways)
                    const targetForwardOffset = activeRoom ? 0 : (8 * this._pipZoomScale);
                    if (this._pipForwardOffset === undefined) this._pipForwardOffset = targetForwardOffset;
                    this._pipForwardOffset += (targetForwardOffset - this._pipForwardOffset) * camTrackSpeed;
                    
                    const offX = -Math.sin(this._pipRot.theta) * this._pipForwardOffset;
                    const offZ = -Math.cos(this._pipRot.theta) * this._pipForwardOffset;
                    
                    // Rubber-band Pan and Zoom back to original view after 1.5s of no interaction
                    if (this._pipLastInteractionTime && (Date.now() - this._pipLastInteractionTime > 1500)) {
                        if (this._pipPan) {
                            this._pipPan.x += (0 - this._pipPan.x) * 0.05;
                            this._pipPan.z += (0 - this._pipPan.z) * 0.05;
                            // Clamp to exact zero to stop micro-calculations
                            if (Math.abs(this._pipPan.x) < 0.01) this._pipPan.x = 0;
                            if (Math.abs(this._pipPan.z) < 0.01) this._pipPan.z = 0;
                        }
                        if (this._pipZoomScale !== undefined) {
                            this._pipZoomScale += (1.0 - this._pipZoomScale) * 0.05;
                        }
                    }

                    const panX = this._pipPan ? this._pipPan.x : 0;
                    const panZ = this._pipPan ? this._pipPan.z : 0;

                    this.topDownCamera.position.set(camPosX + offX + panX, camPosY, camPosZ + offZ + panZ);
                    this.topDownCamera.lookAt(this._pipOrthoTarget.cx + offX + panX, 0, this._pipOrthoTarget.cz + offZ + panZ);



                    // Sync player avatar token
                    if (this.playerAvatar) {
                        this.playerAvatar.position.set(camWX, 0, camWZ);
                        this.playerAvatar.rotation.y = this.player.rot; // Update rotation
                        
                        // Handle walk animation
                        if (this.playerMixer && this.playerWalkAction) {
                            if (this.physMoving) {
                                if (this.playerMixer._current !== 'walk') {
                                    if (this.playerIdleAction) this.playerIdleAction.stop();
                                    this.playerWalkAction.reset();
                                    this.playerWalkAction.play();
                                    this.playerMixer._current = 'walk';
                                }
                            } else {
                                if (this.playerMixer._current !== 'idle') {
                                    this.playerWalkAction.stop();
                                    if (this.playerIdleAction) {
                                        this.playerIdleAction.reset();
                                        this.playerIdleAction.play();
                                    }
                                    this.playerMixer._current = 'idle';
                                }
                            }
                        }
                    }
                }

                if (this.cameraMode === 'topdown' && this.topDownCamera) {
                    // ── TOP-DOWN MAIN + FPV PiP ──────────────────────────────────────
                    // [1] Full-screen top-down
                    this.renderer.setViewport(0, 0, winW, winH);
                    this.renderer.setScissor(0, 0, winW, winH);
                    this.renderer.setScissorTest(true);
                    // AAA RPG Vignette: Heavy fog bounding the screen edge geometry, blending with pitch black
                    this.scene.fog.color.setHex(0x06020f);
                    this.scene.fog.density = 0.02;
                    // Lower ambient slightly from 1.6 to 0.7 so directional shadows actually render black, but keep visibility high
                    if (this.ambientLight) this.ambientLight.intensity = 0.7;
                    this.renderer.setClearColor(0x06020f, 1);
                    if (this.headlamp) this.headlamp.visible = false;
                    this.renderer.render(this.scene, this.topDownCamera);
                    if (this.headlamp) this.headlamp.visible = true;
                    if (this.ambientLight) this.ambientLight.intensity = 0.5;

                    // [2] Small FPV view rendered into mapview-container space
                    this.renderer.setViewport(safeX, safeY, safeW, safeH);
                    this.renderer.setScissor(safeX, safeY, safeW, safeH);
                    this.renderer.setScissorTest(true);
                    
                    // CRITICAL: We MUST clear the depth buffer, or the PiP camera will physically Z-fight with geometry drawn beneath it on the entire screen!
                    this.renderer.clearDepth();
                    
                    const oldAutoClear = this.renderer.autoClear;
                    this.renderer.autoClear = false;

                    // Inject Circular Depth Mask
                    this.renderer.render(window._pipMaskScene, window._pipMaskCam);
                    
                    // Fisheye Lens Optical Expansion
                    const originalFov = this.camera.fov;
                    this.camera.aspect = safeW / safeH;
                    this.camera.fov = originalFov * 1.25;
                    this.camera.updateProjectionMatrix();

                    this.scene.fog.density = 0.055;
                    
                    // CRITICAL: scene.background forces a depth clear in ThreeJS even if autoClear is false!
                    // We must disable it during the PiP pass to preserve the depth mask.
                    const oldBg = this.scene.background;
                    this.scene.background = null;
                    
                    this.renderer.render(this.scene, this.camera);
                    
                    this.scene.background = oldBg;
                    
                    this.renderer.autoClear = oldAutoClear;

                    // Restore original FOV for next frame
                    this.camera.fov = originalFov;

                } else {
                    // ── FPV MAIN + TOP-DOWN PiP (default) ────────────────────────────
                    // [1] FPV main render with scissor/viewport
                    this.renderer.setClearColor(0x06020f, 1);
                    this.scene.fog.density = 0.055;
                    if (this.layoutData && this.layoutData.fpv) {
                        const fRect = this.layoutData.fpv;
                        this.renderer.setViewport(fRect.left, fRect.bottom, fRect.width, fRect.height);
                        this.renderer.setScissor(fRect.left, fRect.bottom, fRect.width, fRect.height);
                        this.renderer.setScissorTest(true);
                    } else {
                        this.renderer.setViewport(0, 0, winW, winH);
                        this.renderer.setScissor(0, 0, winW, winH);
                        this.renderer.setScissorTest(true);
                    }
                    if (this.composer) {
                        this.composer.render();
                    } else {
                        this.renderer.render(this.scene, this.camera);
                    }

                    // [2] Top-down map PiP into mapview-container space
                    if (this.topDownCamera) {
                        this.renderer.setViewport(safeX, safeY, safeW, safeH);
                        this.renderer.setScissor(safeX, safeY, safeW, safeH);
                        this.renderer.setScissorTest(true);
                        
                        // CRITICAL: We MUST clear the depth buffer to isolate the PiP from the Composer FPV pass to stop intense Z-fighting rendering loops!
                        this.renderer.clearDepth();
                        
                        const oldAutoClear = this.renderer.autoClear;
                        this.renderer.autoClear = false;

                        // Inject Circular Depth Mask
                        this.renderer.render(window._pipMaskScene, window._pipMaskCam);
                        
                        // Fisheye Lens Optical Expansion
                        this.topDownCamera.aspect = safeW / safeH;
                        this.topDownCamera.fov = (this._pipFOV || 60) * 1.25;
                        this.topDownCamera.updateProjectionMatrix();
                        
                        // AAA RPG Vignette
                        this.scene.fog.color.setHex(0x000000);
                        this.scene.fog.density = 0.02;
                        if (this.ambientLight) this.ambientLight.intensity = 0.7; // Lowered from 1.6 to allow solid shadows to express
                        if (this.headlamp) this.headlamp.visible = false;
                        
                        // CRITICAL: scene.background forces a depth clear in ThreeJS even if autoClear is false!
                        // We must disable it during the PiP pass to preserve the depth mask.
                        const oldBg = this.scene.background;
                        this.scene.background = null;

                        this.renderer.render(this.scene, this.topDownCamera);
                        
                        this.scene.background = oldBg;
                        if (this.headlamp) this.headlamp.visible = true;
                        if (this.ambientLight) this.ambientLight.intensity = 0.5; // Restore FPV cinematic gloom
                        
                        this.renderer.autoClear = oldAutoClear;

                        // Reset native FPV fog density to active default
                        this.scene.fog.color.setHex(0x08041a);
                        this.scene.fog.density = 0.055;
                    }
                }

                // 3D Avatar handles presence natively now. Legacy 2D canvas drawing removed!


                
                // --- FPS Counter ---
                this.frameCount++;
                const now = performance.now();
                if (now - this.lastFpsTime >= 1000) {
                    this.currentFps = this.frameCount;
                    this.frameCount = 0;
                    this.lastFpsTime = now;
                    const fpsEl = document.getElementById('fps-counter');
                    if (fpsEl) {
                        fpsEl.textContent = `FPS: ${this.currentFps}/60`;
                    }
                }
            }, // Closing brace for animate() function
            
            // Pre-allocated Global Vectors for animate GC optimization
            _anim_mPos: new THREE.Vector3(),
            _anim_cPos: new THREE.Vector3(),
            _anim_dirToPlayer3D: new THREE.Vector3(),
            _anim_dirFromPlayer3D: new THREE.Vector3(),
            _anim_mFacingDir: new THREE.Vector3(0, 0, 1),
            _anim_upAxis: new THREE.Vector3(0, 1, 0),
            _anim_ray: new THREE.Ray(),
            _anim_target: new THREE.Vector3(),
            _anim_hPos: new THREE.Vector3(),
            _anim_dirToHome: new THREE.Vector3(),
        };

        // Prevent arrow keys from scrolling the viewport
        window.addEventListener("keydown", function(e) {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        }, false);
        


        window.onload = () => Engine.init();
    </script>
</body>
</html>
